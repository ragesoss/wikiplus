<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ · Inline 04 · Story Tray</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/content.js"></script>
<style>
  /* ---- Wikipedia look (the WIKI world) ---- */
  .wiki-serif { font-family: 'Linux Libertine','Georgia','Times New Roman',serif; }
  #app .wiki h1.wiki-title,
  #app .wiki h2.wiki-h,
  #app .wiki h3.wiki-h,
  #app .wiki h4.wiki-h { font-family:'Linux Libertine','Georgia','Times New Roman',serif; color:#000; font-weight:400; }
  #app .wiki h1.wiki-title { font-size:1.9rem; line-height:1.25; margin-bottom:.25rem; }
  #app .wiki h2.wiki-h { font-size:1.55rem; margin-top:1.6rem; margin-bottom:.4rem; padding-bottom:.2rem; border-bottom:1px solid #a2a9b1; scroll-margin-top:5rem; }
  #app .wiki h3.wiki-h { font-size:1.22rem; margin-top:1.1rem; margin-bottom:.3rem; padding-bottom:.15rem; border-bottom:1px solid #c8ccd1; scroll-margin-top:5rem; font-weight:600; }
  #app .wiki h4.wiki-h { font-size:1.05rem; margin-top:.9rem; margin-bottom:.25rem; scroll-margin-top:5rem; font-weight:700; }
  #app .wiki .wp-body { color:#202122; font-size:.95rem; line-height:1.65; }
  #app .wiki .wp-body p { margin:.6rem 0; }
  /* blue wikilinks */
  #app .wiki .wl, #app .wiki a.wl:link, #app .wiki a.wl:visited { color:#3366cc; text-decoration:none; }
  #app .wiki .wl:hover { text-decoration:underline; }
  /* right-floated thumbnail figures */
  #app .wiki figure.wp-fig { float:right; clear:right; width:248px; max-width:45%; margin:.3rem 0 .9rem 1.4rem; border:1px solid #a2a9b1; background:#f8f9fa; padding:3px; }
  #app .wiki figure.wp-fig img { display:block; width:100%; height:auto; }
  #app .wiki figure.wp-fig figcaption { font-size:11.5px; line-height:1.4; color:#54595d; padding:5px 3px 2px; }
  #app .wiki figure.wp-fig .credit { color:#72777d; font-size:10px; }
  @media (max-width:640px){ #app .wiki figure.wp-fig { float:none; width:100%; max-width:100%; margin:.6rem 0 1rem; } }
  /* gradient story-ring (the PLUS world signature) */
  .story-ring { background:conic-gradient(from 210deg, #f59e0b, #ec4899, #8b5cf6, #3b82f6, #06b6d4, #f59e0b); }
  /* hide scrollbar on trays */
  .tray::-webkit-scrollbar{ height:7px; }
  .tray::-webkit-scrollbar-thumb{ background:#d4d4d8; border-radius:99px; }
  html{ scroll-behavior:smooth; }
  *:focus-visible{ outline:3px solid #8b5cf6; outline-offset:2px; border-radius:6px; }
  @keyframes pop { from{ transform:scale(.96); opacity:0 } to{ transform:scale(1); opacity:1 } }
  .pop{ animation:pop .16s ease-out; }
</style>
</head>
<body class="bg-white text-[#202122] antialiased">
<div id="app"></div>
<!-- story modal -->
<div id="modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/75 backdrop-blur-sm p-4" role="dialog" aria-modal="true" aria-label="Story video">
  <div id="modalCard" class="relative w-full max-w-md max-h-[92vh] overflow-y-auto rounded-3xl bg-white shadow-2xl pop"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var W = window.WIKIPLUS, A = W.article, CLIPS = W.clips, STATS = W.stats;

  var SVG = {
    play:'<svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M8 5v14l11-7z"/></svg>',
    up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="w-3.5 h-3.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
    ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>',
    x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" class="w-5 h-5"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-4 h-4"><path d="m9 18 6-6-6-6"/></svg>'
  };

  function esc(s){ var d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; }

  // accuracy → palette (never color-alone: always paired with the text label)
  function accCls(acc){
    var a=(acc||"").toLowerCase();
    if(/opinion|anecdot|teaching|classroom/.test(a)) return "bg-amber-100 text-amber-800 ring-amber-300";
    if(/caveat|simplified|condensed|exam|narrow|big-picture|fast/.test(a)) return "bg-sky-100 text-sky-800 ring-sky-300";
    return "bg-emerald-100 text-emerald-800 ring-emerald-300";
  }
  function accDot(acc){
    var a=(acc||"").toLowerCase();
    if(/opinion|anecdot|teaching|classroom/.test(a)) return "bg-amber-500";
    if(/caveat|simplified|condensed|exam|narrow|big-picture|fast/.test(a)) return "bg-sky-500";
    return "bg-emerald-500";
  }

  // group clips
  var bySection={}, general=[];
  CLIPS.forEach(function(c){
    if(c.general) general.push(c);
    else (bySection[c.sectionId]=bySection[c.sectionId]||[]).push(c);
  });
  function clipById(id){ for(var i=0;i<CLIPS.length;i++) if(CLIPS[i].id===id) return CLIPS[i]; }

  function wordmark(extra){ return '<span class="font-extrabold tracking-tight '+(extra||'')+'">wiki<span class="text-emerald-500">+</span></span>'; }

  // ---------- media frame (thumb → player) ----------
  function mediaFrame(c){
    var vert = c.orientation==="vertical";
    var ratio = vert?"aspect-[9/16]":"aspect-video";
    var pid="media-"+c.id;
    return ''
    + '<div id="'+pid+'" class="relative '+ratio+' w-full overflow-hidden bg-gradient-to-br '+c.thumbGrad+' group">'
    +   '<img loading="lazy" src="'+esc(c.thumbnail)+'" alt="'+esc(c.caption)+'" class="absolute inset-0 w-full h-full object-cover" '
    +     'onerror="this.style.display=\'none\';this.parentElement.classList.add(\'bg-gradient-to-br\');">'
    +   '<button data-play="'+c.id+'" aria-label="Play '+esc(c.caption)+'" class="absolute inset-0 flex items-center justify-center bg-black/15 group-hover:bg-black/30 transition-colors">'
    +     '<span class="flex items-center justify-center w-16 h-16 rounded-full bg-white/95 text-pink-600 shadow-xl group-hover:scale-110 transition-transform pl-1">'+SVG.play+'</span>'
    +   '</button>'
    +   '<span class="absolute top-3 left-3 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide bg-black/65 text-white backdrop-blur">'+esc(c.platformLabel)+'</span>'
    +   (c.platform==="tiktok"
        ? '<span class="absolute bottom-3 right-3 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-white/90 text-stone-800">'+SVG.ext+' Opens on TikTok</span>'
        : '')
    + '</div>';
  }

  // ---------- chips ----------
  function chip(label, cls){
    return '<span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[11px] font-semibold ring-1 '+cls+'">'+label+'</span>';
  }
  function metaRow(c){
    return ''
    + '<div class="flex flex-wrap gap-1.5">'
    +   chip('<span class="w-1.5 h-1.5 rounded-full bg-stone-400"></span>'+esc(c.stance),'bg-stone-100 text-stone-700 ring-stone-300')
    +   chip('<span class="w-1.5 h-1.5 rounded-full '+accDot(c.accuracy)+'"></span>'+esc(c.accuracy), accCls(c.accuracy))
    + '</div>';
  }
  function creatorRow(c){
    return ''
    + '<div class="flex items-center gap-2.5">'
    +   '<span class="w-8 h-8 rounded-full bg-gradient-to-br '+c.creator.avatarGrad+' ring-2 ring-white shadow shrink-0"></span>'
    +   '<div class="min-w-0">'
    +     '<a href="'+esc(c.creator.url)+'" target="_blank" rel="noopener" class="block text-sm font-bold text-stone-800 hover:text-pink-600 truncate">'+esc(c.creator.name)+'</a>'
    +     '<div class="text-[11px] text-stone-500 truncate">'+esc(c.creator.handle)+' · '+esc(c.platformLabel)+'</div>'
    +   '</div>'
    + '</div>';
  }
  function footRow(c){
    return ''
    + '<div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-[11px] text-stone-500 pt-0.5">'
    +   '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-pink-50 text-pink-700 font-semibold">'+SVG.up+' '+c.upvotes+'</span>'
    +   '<span>curated by <span class="font-semibold text-stone-700">'+esc(c.curatedBy)+'</span> · '+esc(c.date)+'</span>'
    + '</div>';
  }

  // ---------- Reels-style inline card (section blocks) ----------
  function reelCard(c){
    return ''
    + '<article class="rounded-[22px] p-[2.5px] bg-gradient-to-br from-fuchsia-500 via-pink-500 to-amber-400 shadow-lg shadow-pink-200/50">'
    +   '<div class="rounded-[20px] bg-white overflow-hidden h-full flex flex-col">'
    +     mediaFrame(c)
    +     '<div class="p-4 flex flex-col gap-2.5">'
    +       creatorRow(c)
    +       metaRow(c)
    +       '<p class="text-[13.5px] leading-relaxed text-stone-700"><span class="font-bold text-pink-600">Curator note. </span>'+esc(c.context)+'</p>'
    +       footRow(c)
    +     '</div>'
    +   '</div>'
    + '</article>';
  }

  // ---------- inline PLUS block for a section ----------
  function sectionBlock(secId, secLabel){
    var clips=(bySection[secId]||[]);
    if(!clips.length) return "";
    var sorted=clips.slice().sort(function(a,b){return b.upvotes-a.upvotes;});
    var n=sorted.length;
    var cards=sorted.map(reelCard).join("");
    return ''
    + '<section class="my-7 not-prose" aria-label="wiki+ videos for '+esc(secLabel)+'">'
    +   '<div class="flex items-center gap-2 mb-3">'
    +     '<span class="w-2.5 h-2.5 rounded-full story-ring shadow"></span>'
    +     '<h3 class="text-[13px] font-extrabold uppercase tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 to-amber-500">'+wordmark('text-[13px]')+' reels for this section</h3>'
    +     '<span class="text-[11px] font-bold text-pink-700 bg-pink-100 px-2 py-0.5 rounded-full">'+n+' video'+(n>1?'s':'')+'</span>'
    +   '</div>'
    +   '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">'+cards+'</div>'
    + '</section>';
  }

  // ---------- General STORY TRAY (gradient rings) ----------
  function storyTray(){
    var n=general.length;
    var rings=general.map(function(c){
      return ''
      + '<button data-story="'+c.id+'" class="shrink-0 flex flex-col items-center gap-1.5 w-[78px] group" aria-label="Open story by '+esc(c.creator.name)+'">'
      +   '<span class="story-ring rounded-full p-[3px] group-hover:scale-105 transition-transform">'
      +     '<span class="block rounded-full p-[2.5px] bg-white">'
      +       '<span class="relative block w-16 h-16 rounded-full overflow-hidden bg-gradient-to-br '+c.creator.avatarGrad+'">'
      +         '<img loading="lazy" src="'+esc(c.thumbnail)+'" alt="" class="absolute inset-0 w-full h-full object-cover" onerror="this.style.display=\'none\'">'
      +         '<span class="absolute inset-0 flex items-center justify-center text-white/95 drop-shadow">'+SVG.play+'</span>'
      +       '</span>'
      +     '</span>'
      +   '</span>'
      +   '<span class="text-[11px] font-semibold text-stone-700 leading-tight text-center truncate w-full">'+esc(c.creator.name)+'</span>'
      + '</button>';
    }).join("");
    // "see all (47)" affordance
    var seeAll = ''
      + '<button data-seeall class="shrink-0 flex flex-col items-center gap-1.5 w-[78px]" aria-label="See all '+STATS.totalClips+' videos">'
      +   '<span class="w-[70px] h-[70px] rounded-full flex items-center justify-center bg-stone-100 text-stone-500 ring-2 ring-dashed ring-stone-300 hover:bg-stone-200 transition">'+SVG.chev+'</span>'
      +   '<span class="text-[11px] font-semibold text-stone-500">see all '+STATS.totalClips+'</span>'
      + '</button>';
    return ''
    + '<section class="my-8 not-prose rounded-[26px] p-[2.5px] bg-gradient-to-r from-fuchsia-500 via-pink-500 via-violet-500 to-cyan-400 shadow-xl shadow-fuchsia-200/40" aria-label="General videos for this topic">'
    +   '<div class="rounded-[24px] bg-gradient-to-b from-white to-pink-50/60 p-5">'
    +     '<div class="flex items-end justify-between mb-4 gap-3">'
    +       '<div>'
    +         '<h2 class="text-lg font-extrabold text-stone-900 flex items-center gap-2">'
    +           '<span class="w-2.5 h-2.5 rounded-full story-ring"></span>Watch — general intros'
    +         '</h2>'
    +         '<p class="text-[12px] text-stone-500 mt-0.5">Whole-topic stories, tap a ring to play · '+n+' shown</p>'
    +       '</div>'
    +       '<span class="text-[11px] font-bold text-fuchsia-700 bg-white px-2.5 py-1 rounded-full ring-1 ring-fuchsia-200 shrink-0">'+n+' stories</span>'
    +     '</div>'
    +     '<div class="tray flex gap-3 overflow-x-auto pb-2 -mx-1 px-1">'+rings+seeAll+'</div>'
    +   '</div>'
    + '</section>';
  }

  // ---------- article body ----------
  function htag(level){ return level===2?"h2":level===3?"h3":"h4"; }
  function figureHtml(img){
    if(!img) return "";
    return ''
    + '<figure class="wp-fig">'
    +   '<img loading="lazy" src="'+esc(img.src)+'" alt="'+esc(img.alt||img.caption||"")+'">'
    +   '<figcaption>'+esc(img.caption||"")+(img.credit?' <span class="credit">/ '+esc(img.credit)+'</span>':'')+'</figcaption>'
    + '</figure>';
  }

  var leadHtml = A.lead_html.map(function(h){return '<p>'+h+'</p>';}).join("");

  var bodyHtml="";
  A.sections.forEach(function(s){
    var t=htag(s.level);
    bodyHtml += '<'+t+' id="'+s.id+'" class="wiki-h">'+esc(s.title)+'</'+t+'>';
    bodyHtml += '<div class="wp-body">'+ figureHtml(s.image) + (s.html||[]).map(function(h){return '<p>'+h+'</p>';}).join("") + '<div style="clear:both"></div></div>';
    bodyHtml += sectionBlock(s.id, s.title);
  });

  // ---------- right sidebar: +plus infobox + TOC ----------
  var infobox = ''
    + '<div class="rounded-3xl p-[2.5px] bg-gradient-to-br from-fuchsia-500 via-pink-500 to-amber-400 shadow-lg">'
    +   '<div class="rounded-[22px] bg-white p-4">'
    +     '<div class="flex items-center gap-2 mb-3">'+wordmark('text-base')+'<span class="text-[12px] font-semibold text-stone-500">layer</span></div>'
    +     '<div class="grid grid-cols-3 gap-2 text-center">'
    +       '<div class="rounded-xl bg-pink-50 py-2"><div class="text-lg font-extrabold text-pink-600">'+STATS.totalClips+'</div><div class="text-[10px] font-semibold text-stone-500 uppercase tracking-wide">videos</div></div>'
    +       '<div class="rounded-xl bg-violet-50 py-2"><div class="text-lg font-extrabold text-violet-600">'+STATS.creatorCount+'</div><div class="text-[10px] font-semibold text-stone-500 uppercase tracking-wide">creators</div></div>'
    +       '<div class="rounded-xl bg-amber-50 py-2"><div class="text-lg font-extrabold text-amber-600">'+STATS.curatorCount+'</div><div class="text-[10px] font-semibold text-stone-500 uppercase tracking-wide">curators</div></div>'
    +     '</div>'
    +     '<div class="mt-3 flex items-center gap-1.5 text-[11px] text-stone-500"><span class="w-2 h-2 rounded-full bg-emerald-500"></span>synced '+esc(STATS.synced)+'</div>'
    +   '</div>'
    + '</div>';

  // TOC: General first (special), then sections (indent h3/h4). Ring/dot for counts.
  function tocEntry(href, label, count, padCls, special){
    var ind='';
    if(count>0){
      ind = special
        ? '<span class="shrink-0 story-ring rounded-full p-[2px]"><span class="block w-5 h-5 rounded-full bg-white text-[10px] font-bold text-pink-600 flex items-center justify-center">'+count+'</span></span>'
        : '<span class="shrink-0 inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-full text-[10px] font-bold bg-pink-100 text-pink-700 group-hover:bg-pink-500 group-hover:text-white transition">'+count+'</span>';
    }
    return '<a href="'+href+'" data-toc="'+href.slice(1)+'" class="group toc-link flex items-center justify-between gap-2 py-1 '+padCls+' text-[12.5px] '+(special?'font-bold text-stone-800':'text-stone-500')+' hover:text-pink-600 transition rounded">'
      + '<span class="truncate flex items-center gap-1.5">'+(special?'<span class="w-2 h-2 rounded-full story-ring"></span>':'')+esc(label)+'</span>'
      + ind + '</a>';
  }
  var tocHtml = tocEntry('#general','General', general.length, 'pl-0', true);
  A.sections.forEach(function(s){
    var pad = s.level===2?'pl-0':(s.level===3?'pl-3':'pl-6');
    var n=(bySection[s.id]||[]).length;
    tocHtml += tocEntry('#'+s.id, s.title, n, pad, false);
  });

  // ---------- assemble ----------
  document.getElementById("app").innerHTML = ''
  + '<header class="sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-stone-200">'
  +   '<div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">'
  +     '<div class="flex items-center gap-2">'+wordmark('text-xl text-stone-900')+'<span class="hidden sm:inline text-stone-300">/</span><span class="hidden sm:inline text-sm font-medium text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 to-amber-500">Story Tray</span></div>'
  +     '<a href="'+esc(A.url)+'" target="_blank" rel="noopener" class="flex items-center gap-1.5 text-[12px] text-stone-500 hover:text-pink-600">'+SVG.ext+' From Wikipedia · '+esc(A.license)+'</a>'
  +   '</div>'
  + '</header>'

  + '<div class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-9">'

  // ---- main column (the WIKI world) ----
  + '<main class="wiki min-w-0 py-8">'
  +   '<h1 class="wiki-title">'+esc(A.title)+'</h1>'
  +   '<div class="text-[12.5px] text-stone-500 mb-3 pb-2 border-b border-[#a2a9b1]">From <a href="'+esc(A.url)+'" target="_blank" rel="noopener" class="wl">Wikipedia</a> · '+esc(A.license)+'</div>'
  +   '<div class="wp-body">'+ figureHtml(A.leadImage) + leadHtml + '<div style="clear:both"></div></div>'
  +   storyTray()
  +   bodyHtml
  +   '<footer class="mt-12 pt-6 border-t border-[#a2a9b1] text-[12px] text-stone-400">Article text & images from <a href="'+esc(A.url)+'" target="_blank" rel="noopener" class="wl">'+esc(A.source)+'</a>, licensed '+esc(A.license)+'. Video context layered by the wiki+ community.</footer>'
  + '</main>'

  // ---- right sidebar (the PLUS world) ----
  + '<aside class="hidden lg:block py-8">'
  +   '<div class="sticky top-20 space-y-4">'
  +     infobox
  +     '<nav aria-label="Contents" class="rounded-3xl border border-stone-200 bg-white p-4 shadow-sm">'
  +       '<div class="text-[11px] font-bold uppercase tracking-wide text-stone-400 mb-2">Contents</div>'
  +       '<div class="max-h-[58vh] overflow-y-auto pr-1 tray">'+tocHtml+'</div>'
  +     '</nav>'
  +   '</div>'
  + '</aside>'

  + '</div>'
  + '<div class="fixed bottom-4 right-4 z-40 px-3 py-1.5 rounded-full bg-gradient-to-r from-fuchsia-600 to-amber-500 text-white text-[11px] font-bold shadow-lg ring-1 ring-white/20">Inline 04 · Story Tray</div>';

  // ---------- player swap ----------
  function playInto(frameId, c){
    var frame=document.getElementById(frameId);
    if(!frame) return;
    if(c.platform==="tiktok"){ window.open(c.watch_url,"_blank","noopener"); return; }
    frame.innerHTML='<iframe class="absolute inset-0 w-full h-full" src="'+c.embed_url+'?autoplay=1" title="'+esc(c.caption)+'" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  }

  // ---------- story modal (general rings) ----------
  var modal=document.getElementById("modal"), modalCard=document.getElementById("modalCard");
  function openStory(c){
    modalCard.innerHTML = ''
    + '<button data-close class="absolute top-3 right-3 z-10 w-9 h-9 rounded-full bg-black/45 text-white flex items-center justify-center hover:bg-black/65" aria-label="Close">'+SVG.x+'</button>'
    + '<div class="story-ring p-[3px] rounded-t-3xl rounded-b-none"><div class="rounded-t-[21px] overflow-hidden bg-black">'+mediaFrame(c)+'</div></div>'
    + '<div class="p-5 flex flex-col gap-3">'
    +   creatorRow(c)
    +   metaRow(c)
    +   '<p class="text-sm leading-relaxed text-stone-700"><span class="font-bold text-pink-600">Curator note. </span>'+esc(c.context)+'</p>'
    +   (c.platform==="tiktok" ? '<a href="'+esc(c.watch_url)+'" target="_blank" rel="noopener" class="inline-flex items-center justify-center gap-1.5 w-full py-2.5 rounded-full bg-stone-900 text-white text-sm font-semibold hover:bg-stone-700">'+SVG.ext+' Open on TikTok</a>' : '')
    +   footRow(c)
    + '</div>';
    modal.classList.remove("hidden"); modal.classList.add("flex");
    document.body.style.overflow="hidden";
  }
  function closeStory(){
    modal.classList.add("hidden"); modal.classList.remove("flex");
    modalCard.innerHTML=""; document.body.style.overflow="";
  }

  // ---------- delegated clicks ----------
  document.addEventListener("click", function(e){
    var st=e.target.closest("[data-story]");
    if(st){ openStory(clipById(st.getAttribute("data-story"))); return; }
    var pb=e.target.closest("[data-play]");
    if(pb){ playInto("media-"+pb.getAttribute("data-play"), clipById(pb.getAttribute("data-play"))); return; }
    if(e.target.closest("[data-close]") || e.target===modal){ closeStory(); return; }
    var sa=e.target.closest("[data-seeall]");
    if(sa){ if(general[0]) openStory(general[0]); return; }
  });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape" && !modal.classList.contains("hidden")) closeStory(); });

  // ---------- scrollspy ----------
  var links=[].slice.call(document.querySelectorAll(".toc-link"));
  var ids=links.map(function(l){return l.getAttribute("data-toc");});
  var targets=ids.map(function(id){return document.getElementById(id);});
  function setActive(id){
    links.forEach(function(l){
      var on=l.getAttribute("data-toc")===id;
      l.classList.toggle("text-pink-600", on);
      l.classList.toggle("bg-pink-50", on);
      l.classList.toggle("font-bold", on);
    });
  }
  var spy=new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting) setActive(en.target.id); });
  }, { rootMargin:"-15% 0px -70% 0px", threshold:0 });
  targets.forEach(function(t){ if(t) spy.observe(t); });
});
</script>
</body>
</html>
