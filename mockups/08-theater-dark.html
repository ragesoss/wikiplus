<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ Theater · Photosynthesis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/content.js"></script>
<style>
  html { scroll-behavior: smooth; }
  body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
  .serif { font-family: Georgia, 'Times New Roman', serif; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes pulse-soft { 0%,100% { opacity: .9 } 50% { opacity: .4 } }
  .skel { animation: pulse-soft 1.5s ease-in-out infinite; }
  #glow { transition: opacity .6s ease; }
</style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen relative overflow-x-hidden">
<!-- ambient accent glow driven by active clip thumbGrad -->
<div id="glow" class="pointer-events-none fixed inset-0 -z-10 opacity-40 blur-3xl bg-gradient-to-br from-emerald-500 via-green-600 to-teal-800"></div>
<div id="app"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const W = window.WIKIPLUS;
  const A = W.article, CLIPS = W.clips, S = W.stats;
  const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h !== undefined) e.innerHTML = h; return e; };
  let active = CLIPS[0];

  function accuracyClasses(acc) {
    const a = acc.toLowerCase();
    if (a.includes('opinion') || a.includes('anecdot') || a.includes('teaching')) return 'bg-amber-400/15 text-amber-300 ring-amber-400/30';
    if (a.includes('simplified') || a.includes('caveat') || a.includes('condensed') || a.includes('exam') || a.includes('definitional') || a.includes('big-picture') || a.includes('fast')) return 'bg-sky-400/15 text-sky-300 ring-sky-400/30';
    return 'bg-emerald-400/15 text-emerald-300 ring-emerald-400/30';
  }
  const dot = `<svg viewBox="0 0 8 8" class="w-2 h-2 inline-block mr-1"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>`;
  const icons = {
    play: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8"><path d="M8 5v14l11-7z"/></svg>`,
    playSm: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M8 5v14l11-7z"/></svg>`,
    up: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    tt: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5"><path d="M16.5 5.8a4.8 4.8 0 0 1-3.3-1.3v8.6a5.5 5.5 0 1 1-5.5-5.5c.3 0 .6 0 .8.1v2.7a2.8 2.8 0 1 0 2 2.7V2h2.7a4.8 4.8 0 0 0 3.3 4z"/></svg>`,
    yt: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 4.9 12 4.9 12 4.9s-7 0-8.9.5A3 3 0 0 0 1 7.5 31 31 0 0 0 .5 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1c1.9.5 8.9.5 8.9.5s7 0 8.9-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.5 12 31 31 0 0 0 23 7.5zM9.8 15.3V8.7l5.7 3.3z"/></svg>`,
  };
  const platIcon = c => c.platform === 'tiktok' ? icons.tt : icons.yt;
  const wordmark = ex => `<span class="font-bold tracking-tight ${ex||''}">wiki<span class="text-emerald-400">+</span></span>`;

  /* ===================== HEADER ===================== */
  const header = el('header', 'sticky top-0 z-30 bg-zinc-950/80 backdrop-blur border-b border-white/5');
  header.innerHTML = `
    <div class="max-w-[1500px] mx-auto px-5 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        ${wordmark('text-xl')}
        <span class="text-zinc-600">/</span>
        <span class="text-sm text-zinc-400">Theater</span>
        <span class="text-sm font-semibold">${A.title}</span>
      </div>
      <div class="hidden md:flex items-center gap-4 text-[12px] text-zinc-400">
        <span><span class="font-semibold text-zinc-200">${S.totalClips}</span> clips</span>
        <span><span class="font-semibold text-zinc-200">${S.creatorCount}</span> creators</span>
        <span><span class="font-semibold text-zinc-200">${S.upvoteTotal.toLocaleString()}</span> upvotes</span>
        <a href="${A.url}" target="_blank" class="text-emerald-400 hover:underline">From Wikipedia · ${A.license}</a>
      </div>
    </div>`;
  document.getElementById('app').appendChild(header);

  /* ===================== LAYOUT: stage | context | queue ===================== */
  const grid = el('div', 'max-w-[1500px] mx-auto px-5 py-6 grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_340px] xl:grid-cols-[minmax(0,1fr)_340px_320px] gap-6');
  document.getElementById('app').appendChild(grid);

  /* ---------- STAGE ---------- */
  const stageCol = el('div', 'min-w-0');
  const stage = el('div', 'rounded-2xl bg-black ring-1 ring-white/10 overflow-hidden shadow-2xl');
  const stageInner = el('div', 'flex items-center justify-center bg-black');
  stageInner.id = 'stage-inner';
  stage.appendChild(stageInner);
  stageCol.appendChild(stage);

  // meta strip under stage
  const stageMeta = el('div', 'mt-3', '');
  stageMeta.id = 'stage-meta';
  stageCol.appendChild(stageMeta);

  // article reading panel below the stage
  const readPanel = el('details', 'mt-6 rounded-2xl bg-zinc-900/60 ring-1 ring-white/10 overflow-hidden');
  readPanel.open = false;
  const summary = el('summary', 'cursor-pointer select-none px-5 py-4 flex items-center justify-between hover:bg-white/5');
  summary.innerHTML = `<span class="serif text-lg font-bold">Read the article · ${A.title}</span>
    <span class="text-[12px] text-zinc-400">From Wikipedia · ${A.license} ▾</span>`;
  readPanel.appendChild(summary);
  const readBody = el('div', 'px-6 pb-6 max-h-[60vh] overflow-y-auto');
  A.lead.forEach(p => readBody.appendChild(el('p', 'serif text-[15px] leading-relaxed text-zinc-300 mb-3', p)));
  A.sections.forEach(s => {
    const sizes = { 2: 'text-xl mt-6 text-emerald-300', 3: 'text-lg mt-5 text-zinc-100', 4: 'text-base mt-4 text-zinc-200' };
    const h = el('h' + s.level, `serif font-bold ${sizes[s.level] || 'text-base mt-3'}`, s.title);
    h.id = 'sec-' + s.id; h.style.scrollMarginTop = '4rem';
    readBody.appendChild(h);
    s.paras.forEach(p => readBody.appendChild(el('p', 'serif text-[14px] leading-relaxed text-zinc-400 mt-2', p)));
  });
  readPanel.appendChild(readBody);
  stageCol.appendChild(readPanel);
  grid.appendChild(stageCol);

  /* ---------- CONTEXT PANEL ---------- */
  const ctxCol = el('div', 'min-w-0');
  const ctx = el('div', 'lg:sticky lg:top-20 rounded-2xl bg-zinc-900/70 ring-1 ring-white/10 p-5');
  ctx.id = 'ctx-panel';
  ctxCol.appendChild(ctx);
  grid.appendChild(ctxCol);

  /* ---------- QUEUE ---------- */
  const qCol = el('div', 'min-w-0');
  const qBox = el('div', 'lg:sticky lg:top-20 rounded-2xl bg-zinc-900/70 ring-1 ring-white/10 p-3 flex flex-col');
  const qHead = el('div', 'px-1 pb-3 mb-2 border-b border-white/10 flex items-center justify-between');
  qHead.innerHTML = `<span class="text-sm font-semibold text-zinc-200">Up next</span>
    <span id="q-count" class="text-[11px] text-zinc-400">${CLIPS.length} of ${S.totalClips}</span>`;
  qBox.appendChild(qHead);
  const qList = el('div', 'space-y-2 max-h-[calc(100vh-10rem)] overflow-y-auto pr-1');
  qBox.appendChild(qList);
  qCol.appendChild(qBox);
  grid.appendChild(qCol);

  /* ===================== RENDERERS ===================== */
  function setGlow(c) {
    const g = document.getElementById('glow');
    g.className = `pointer-events-none fixed inset-0 -z-10 opacity-40 blur-3xl bg-gradient-to-br ${c.thumbGrad}`;
  }

  // build the large player for active clip (facade -> iframe / tiktok link-out)
  function renderStage(c) {
    const inner = document.getElementById('stage-inner');
    inner.innerHTML = '';
    const vertical = c.orientation === 'vertical';
    // frame sized to true ratio; vertical capped by height
    const frame = el('div', `relative overflow-hidden bg-gradient-to-br ${c.thumbGrad} ${vertical ? 'aspect-[9/16] h-[72vh] max-h-[680px]' : 'aspect-video w-full'}`);
    const img = el('img', 'absolute inset-0 w-full h-full object-cover');
    img.loading = 'lazy'; img.src = c.thumbnail; img.alt = c.caption;
    img.onerror = function () { this.style.display = 'none'; };
    frame.appendChild(img);
    frame.appendChild(el('div', 'absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-black/30'));

    // badges
    frame.appendChild(el('span', 'absolute top-3 left-3 z-10 inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-black/70 text-white text-[11px] font-medium backdrop-blur',
      `${platIcon(c)}<span>${c.platformLabel}</span>`));
    frame.appendChild(el('span', 'absolute top-3 right-3 z-10 px-2 py-1 rounded bg-black/60 text-white text-[10px] font-semibold',
      vertical ? '9:16' : '16:9'));

    // big play
    const play = el('button', 'absolute inset-0 z-10 flex flex-col items-center justify-center gap-3 group');
    play.innerHTML = `<span class="w-20 h-20 rounded-full bg-white/95 text-zinc-900 grid place-items-center shadow-2xl group-hover:scale-105 transition">${icons.play}</span>`;
    if (c.platform === 'tiktok') {
      play.innerHTML += `<span class="px-3 py-1.5 rounded-full bg-black/70 text-white text-sm font-semibold backdrop-blur">Open on TikTok ↗</span>`;
      play.onclick = () => window.open(c.watch_url, '_blank');
    } else {
      play.onclick = () => {
        const iframe = el('iframe', 'absolute inset-0 w-full h-full z-20');
        iframe.src = `${c.embed_url}?autoplay=1`;
        iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
        iframe.allowFullscreen = true;
        frame.innerHTML = '';
        frame.appendChild(iframe);
      };
    }
    frame.appendChild(play);

    // caption overlay
    frame.appendChild(el('div', 'absolute bottom-0 left-0 right-0 z-10 p-4',
      `<div class="flex items-center gap-2 mb-1">
         <span class="w-8 h-8 rounded-full bg-gradient-to-br ${c.creator.avatarGrad} ring-2 ring-white/20"></span>
         <div class="leading-tight"><div class="text-sm font-semibold text-white">${c.creator.name}</div>
         <div class="text-[11px] text-white/70">${c.creator.handle} · ${c.platformLabel}</div></div>
       </div>
       <p class="text-white font-medium text-[15px] drop-shadow">${c.caption}</p>`));
    inner.appendChild(frame);

    // stage meta strip
    document.getElementById('stage-meta').innerHTML = `
      <div class="flex flex-wrap items-center gap-3 text-[13px] text-zinc-400">
        <span class="inline-flex items-center gap-1 text-zinc-300 font-medium">${icons.up}${c.upvotes.toLocaleString()}</span>
        <span>·</span>
        <span>Curated by <span class="text-zinc-300 font-medium">${c.curatedBy}</span></span>
        <span>·</span><span>${c.date}</span>
      </div>`;
  }

  function renderContext(c) {
    document.getElementById('ctx-panel').innerHTML = `
      <div class="flex items-center gap-3 mb-4">
        <span class="w-11 h-11 rounded-full bg-gradient-to-br ${c.creator.avatarGrad} ring-2 ring-white/10 shrink-0"></span>
        <div class="min-w-0">
          <a href="${c.creator.url}" target="_blank" class="block font-semibold truncate hover:underline">${c.creator.name}</a>
          <div class="text-[12px] text-zinc-400 truncate flex items-center gap-1">${c.creator.handle} · ${platIcon(c)} ${c.platformLabel}</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-4">
        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium bg-white/10 text-zinc-200 ring-1 ring-white/10">${c.stance}</span>
        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium ring-1 ${accuracyClasses(c.accuracy)}">${dot}${c.accuracy}</span>
      </div>
      <div class="rounded-xl bg-amber-400/5 ring-1 ring-amber-400/20 p-3 mb-4">
        <div class="text-[10px] uppercase tracking-wider font-semibold text-amber-300/80 mb-1">Curator's context note</div>
        <p class="text-[13.5px] leading-relaxed text-zinc-300">${c.context}</p>
      </div>
      <a href="#sec-${c.sectionId}" onclick="(function(){const d=document.querySelector('details');if(d)d.open=true;})()" class="inline-flex items-center gap-1.5 text-[13px] font-semibold text-emerald-400 hover:text-emerald-300 hover:underline mb-4">${icons.arrow}<span>${c.sectionLabel}</span></a>
      <div class="pt-3 border-t border-white/10 flex items-center justify-between text-[12px] text-zinc-400">
        <span class="inline-flex items-center gap-1 text-zinc-300 font-medium">${icons.up}${c.upvotes.toLocaleString()}</span>
        <span>${c.curatedBy} · ${c.date}</span>
      </div>`;
  }

  function queueItem(c) {
    const isActive = c.id === active.id;
    const item = el('button', `w-full text-left rounded-xl p-2 flex gap-2.5 transition ring-1 ${isActive ? 'bg-emerald-400/10 ring-emerald-400/40' : 'bg-white/[0.03] ring-white/5 hover:bg-white/[0.07]'}`);
    item.dataset.qid = c.id;
    // thumb mini
    const tw = el('div', `relative shrink-0 rounded-lg overflow-hidden bg-gradient-to-br ${c.thumbGrad} ${c.orientation==='vertical' ? 'w-12 h-20' : 'w-24 h-[54px]'}`);
    const img = el('img', 'absolute inset-0 w-full h-full object-cover');
    img.loading = 'lazy'; img.src = c.thumbnail; img.alt = c.caption;
    img.onerror = function(){ this.style.display='none'; };
    tw.appendChild(img);
    tw.appendChild(el('span', 'absolute inset-0 grid place-items-center text-white/90', icons.playSm));
    tw.appendChild(el('span', 'absolute bottom-0.5 left-0.5 text-white/80', platIcon(c)));
    item.appendChild(tw);
    const meta = el('div', 'min-w-0 flex-1');
    meta.innerHTML = `
      <p class="text-[12.5px] font-medium leading-snug line-clamp-2 ${isActive?'text-emerald-200':'text-zinc-200'}">${c.caption}</p>
      <div class="text-[11px] text-zinc-500 mt-0.5 truncate">${c.creator.name}</div>
      <div class="flex items-center gap-2 mt-1">
        <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-medium ring-1 ${accuracyClasses(c.accuracy)}">${c.accuracy.split('·')[0].trim()}</span>
        <span class="text-[10px] text-zinc-500 inline-flex items-center gap-0.5">${icons.up.replace('w-4 h-4','w-3 h-3')}${c.upvotes}</span>
      </div>`;
    item.appendChild(meta);
    item.onclick = () => selectClip(c);
    return item;
  }

  function queueSkeleton() {
    const s = el('div', 'w-full rounded-xl p-2 flex gap-2.5 bg-white/[0.03] ring-1 ring-white/5 skel');
    s.innerHTML = `<div class="w-24 h-[54px] rounded-lg bg-zinc-700/60 shrink-0"></div>
      <div class="flex-1 space-y-1.5 py-1"><div class="h-3 w-full bg-zinc-700/60 rounded"></div>
      <div class="h-3 w-2/3 bg-zinc-700/60 rounded"></div><div class="h-2.5 w-1/2 bg-zinc-700/50 rounded"></div></div>`;
    return s;
  }

  function selectClip(c) {
    active = c;
    setGlow(c);
    renderStage(c);
    renderContext(c);
    // refresh active highlight in queue
    qList.querySelectorAll('[data-qid]').forEach(n => {
      const on = n.dataset.qid === c.id;
      n.className = `w-full text-left rounded-xl p-2 flex gap-2.5 transition ring-1 ${on ? 'bg-emerald-400/10 ring-emerald-400/40' : 'bg-white/[0.03] ring-white/5 hover:bg-white/[0.07]'}`;
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ===================== INIT ===================== */
  CLIPS.forEach(c => qList.appendChild(queueItem(c)));

  // infinite-scroll sentinel -> appends skeleton queue items + reached message
  let exhausted = false;
  const sentinel = el('div', 'py-4 text-center');
  sentinel.innerHTML = `<span class="text-[11px] text-zinc-500">Loading more from ${S.totalClips}…</span>`;
  qList.appendChild(sentinel);

  function loadMoreQueue() {
    if (exhausted) return;
    exhausted = true;
    for (let i = 0; i < 4; i++) qList.insertBefore(queueSkeleton(), sentinel);
    sentinel.innerHTML = `<div class="rounded-xl bg-emerald-400/10 ring-1 ring-emerald-400/20 p-3">
        <p class="text-[12.5px] font-semibold text-emerald-200">You've reached the curated top picks</p>
        <p class="text-[11px] text-emerald-300/70 mt-0.5">Browse all <span class="font-semibold">${S.totalClips}</span> clips for this topic</p>
        <button class="mt-2 text-[11px] font-semibold text-emerald-300 underline">Open full queue →</button>
      </div>`;
    document.getElementById('q-count').textContent = `${CLIPS.length} of ${S.totalClips}`;
  }

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) loadMoreQueue(); });
  }, { root: qList, threshold: 0.1 });
  io.observe(sentinel);
  // fallback if IO root scroll never triggers
  setTimeout(() => { if (!exhausted) loadMoreQueue(); }, 4000);

  // boot with top clip
  selectClip(active);

  /* ===================== VARIANT BADGE ===================== */
  const badge = el('div', 'fixed bottom-4 right-4 z-40 px-3 py-1.5 rounded-full bg-white text-zinc-900 text-[11px] font-semibold shadow-lg');
  badge.textContent = 'Variant 08 · Theater (Dark)';
  document.body.appendChild(badge);
});
</script>
</body>
</html>
