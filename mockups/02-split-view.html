<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ · Split View</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/content.js"></script>
<style>
  html,body{height:100%;margin:0}
  .feed-scroll{scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
  .snap-item{scroll-snap-align:start}
  .ctx-scroll::-webkit-scrollbar{width:8px}
  .ctx-scroll::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:9999px}
  .ctx-scroll::-webkit-scrollbar-track{background:transparent}
  .clip-line-clamp{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
  @keyframes shimmer{0%{background-position:-468px 0}100%{background-position:468px 0}}
  .skel{background:#e5e7eb;background-image:linear-gradient(90deg,#e5e7eb 0px,#f3f4f6 40px,#e5e7eb 80px);background-size:600px;animation:shimmer 1.4s infinite linear}
  .sec-active{background:linear-gradient(90deg,rgba(16,185,129,.12),transparent);border-left-color:#10b981!important}
</style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">
<div id="app" class="h-full"></div>

<!-- fixed variant badge -->
<div class="fixed bottom-3 right-3 z-50 select-none rounded-full bg-slate-900/90 px-3 py-1.5 text-xs font-medium text-white shadow-lg backdrop-blur">
  Variant 02 · Split View
</div>

<script>
const W = window.WIKIPLUS;

/* ---------- helpers ---------- */
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };

// stance/accuracy -> color family (green accurate, sky/lime caveat/simplified, amber opinion/anecdotal/teaching)
function accuracyChip(accuracy){
  const a = (accuracy||'').toLowerCase();
  let cls = 'bg-emerald-100 text-emerald-800 ring-emerald-200';
  if(/simplified|caveat|condensed|exam|definitional|big-picture|ultra/.test(a)) cls='bg-sky-100 text-sky-800 ring-sky-200';
  if(/teaching|anecdot|opinion|classroom/.test(a)) cls='bg-amber-100 text-amber-800 ring-amber-200';
  return `<span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-[11px] font-semibold ring-1 ring-inset ${cls}">${dotSvg()} ${esc(accuracy)}</span>`;
}
function stanceChip(stance){
  return `<span class="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-0.5 text-[11px] font-semibold text-slate-600 ring-1 ring-inset ring-slate-200">${esc(stance)}</span>`;
}
const dotSvg = ()=>`<svg viewBox="0 0 8 8" class="h-2 w-2 fill-current"><circle cx="4" cy="4" r="4"/></svg>`;
const upSvg = ()=>`<svg viewBox="0 0 24 24" class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`;
const playSvg = ()=>`<svg viewBox="0 0 24 24" class="h-7 w-7 translate-x-0.5 fill-white"><path d="M8 5v14l11-7z"/></svg>`;
const extSvg = ()=>`<svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>`;
const arrowSvg = ()=>`<svg viewBox="0 0 24 24" class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
const platIcon = (p)=>{
  if(p==='tiktok') return `<svg viewBox="0 0 24 24" class="h-3.5 w-3.5 fill-current"><path d="M16.6 5.82a4.28 4.28 0 0 1-1.06-2.82h-3.2v12.86a2.4 2.4 0 1 1-2.4-2.4c.13 0 .26.01.39.03V10.2a5.6 5.6 0 1 0 5.2 5.58V9.3a7.13 7.13 0 0 0 4.07 1.27V7.37a4.28 4.28 0 0 1-3-1.55z"/></svg>`;
  return `<svg viewBox="0 0 24 24" class="h-3.5 w-3.5 fill-current"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 5 12 5 12 5s-7 0-8.9.4A3 3 0 0 0 1 7.5 31 31 0 0 0 .6 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1C5 19 12 19 12 19s7 0 8.9-.4a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.4 12 31 31 0 0 0 23 7.5zM9.75 15.5v-7l6 3.5z"/></svg>`;
};
const wordmark = ()=>`<span class="text-xl font-extrabold tracking-tight text-slate-900">wiki<span class="text-emerald-500">+</span></span>`;

/* ---------- LEFT: article ---------- */
function buildArticle(){
  const a = W.article;
  const left = el('div','flex h-full flex-col');

  const head = el('div','shrink-0 border-b border-slate-200 bg-white px-6 py-4');
  head.innerHTML = `
    <div class="flex items-center gap-2">${wordmark()}<span class="rounded bg-slate-100 px-2 py-0.5 text-[11px] font-medium text-slate-500">Topic</span></div>
    <h1 class="mt-2 text-2xl font-bold text-slate-900">${esc(a.title)}</h1>
    <a href="${esc(a.url)}" target="_blank" rel="noopener" class="mt-1 inline-flex items-center gap-1 text-xs text-slate-500 hover:text-emerald-600">
      From Wikipedia · ${esc(a.license)} ${extSvg()}
    </a>`;
  left.appendChild(head);

  const scroll = el('div','ctx-scroll min-h-0 flex-1 overflow-y-auto px-6 py-5');
  // lead
  const lead = el('div','prose-sm max-w-none');
  a.lead.forEach((p,i)=>{
    const para = el('p', (i===0?'text-[15px] leading-7 text-slate-700 font-medium':'mt-3 text-[15px] leading-7 text-slate-600'), esc(p));
    lead.appendChild(para);
  });
  scroll.appendChild(lead);

  // sections
  a.sections.forEach(s=>{
    const wrap = el('section','mt-6 scroll-mt-4 border-l-2 border-transparent pl-3 transition-colors duration-300');
    wrap.id = 'sec-'+s.id;
    wrap.dataset.secid = s.id;
    let hcls = 'text-slate-900 font-bold';
    let htag = 'h2', hsize='text-lg';
    if(s.level===3){htag='h3';hsize='text-base';}
    if(s.level===4){htag='h4';hsize='text-sm uppercase tracking-wide text-slate-500';}
    wrap.appendChild(el(htag, `${hsize} ${s.level===4?'':hcls} scroll-mt-2`, esc(s.title)));
    if(!s.paras || !s.paras.length){
      wrap.appendChild(el('p','mt-1 text-sm italic text-slate-400','(See full article for this section.)'));
    } else {
      s.paras.forEach(p=>wrap.appendChild(el('p','mt-2 text-sm leading-6 text-slate-600', esc(p))));
    }
    scroll.appendChild(wrap);
  });

  const foot = el('div','mt-8 rounded-lg bg-slate-50 p-4 text-xs text-slate-500');
  foot.innerHTML = `Article text from <a class="font-medium text-emerald-700 hover:underline" target="_blank" rel="noopener" href="${esc(a.url)}">${esc(a.source)}</a>, licensed ${esc(a.license)}. Wikidata ${esc(a.qid)}.`;
  scroll.appendChild(foot);

  left.appendChild(scroll);
  return left;
}

/* ---------- RIGHT: clip feed ---------- */
let sectionEls = {}; // secid -> left section element
let leftScrollEl = null;

function highlightSection(secid){
  Object.values(sectionEls).forEach(e=>e.classList.remove('sec-active'));
  const t = sectionEls[secid];
  if(t){ t.classList.add('sec-active'); }
}

function buildClipCard(clip){
  const vertical = clip.orientation === 'vertical';
  const card = el('article','snap-item mx-auto w-full max-w-md');
  card.dataset.secid = clip.sectionId;

  // media frame at TRUE ratio
  const frameWrap = el('div', 'relative w-full overflow-hidden rounded-xl bg-slate-800 shadow-lg ' + (vertical ? 'aspect-[9/16] max-h-[68vh] mx-auto' : 'aspect-video'));
  if(vertical) frameWrap.classList.add('max-w-[340px]');

  // img with onerror gradient fallback
  const img = el('img','absolute inset-0 h-full w-full object-cover');
  img.loading = 'lazy';
  img.src = clip.thumbnail;
  img.alt = esc(clip.caption);
  img.setAttribute('onerror', `this.style.display='none'; this.parentElement.classList.add('bg-gradient-to-br'); ${JSON.stringify(clip.thumbGrad).slice(1,-1).split(' ').map(g=>`this.parentElement.classList.add('${g}')`).join(';')}`);
  frameWrap.appendChild(img);

  // gradient scrim
  frameWrap.appendChild(el('div','absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-black/25 pointer-events-none'));

  // platform badge
  const badge = el('div','absolute left-3 top-3 inline-flex items-center gap-1.5 rounded-full bg-black/65 px-2.5 py-1 text-[11px] font-semibold text-white backdrop-blur');
  badge.innerHTML = `${platIcon(clip.platform)} ${esc(clip.platformLabel)}`;
  frameWrap.appendChild(badge);

  // play overlay
  const overlay = el('button','group absolute inset-0 flex items-center justify-center');
  overlay.setAttribute('aria-label', clip.platform==='tiktok' ? 'Open on TikTok' : 'Play video');
  const playBtn = el('span','flex h-16 w-16 items-center justify-center rounded-full bg-emerald-500/90 shadow-xl transition group-hover:scale-110 group-hover:bg-emerald-500');
  playBtn.innerHTML = playSvg();
  overlay.appendChild(playBtn);

  if(clip.platform === 'tiktok'){
    overlay.innerHTML += `<span class="absolute bottom-4 inline-flex items-center gap-1 rounded-full bg-white/90 px-3 py-1 text-xs font-semibold text-slate-800">${extSvg()} Open on TikTok</span>`;
    overlay.addEventListener('click', ()=> window.open(clip.watch_url,'_blank','noopener'));
  } else {
    overlay.addEventListener('click', ()=>{
      const iframe = el('iframe','absolute inset-0 h-full w-full');
      iframe.src = clip.embed_url + '?autoplay=1';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.setAttribute('frameborder','0');
      frameWrap.querySelectorAll('img,button,div').forEach(n=>n.remove());
      frameWrap.appendChild(iframe);
    });
  }
  frameWrap.appendChild(overlay);

  card.appendChild(frameWrap);

  // info block below
  const info = el('div','mt-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm');

  // creator row
  const cr = el('div','flex items-center gap-3');
  cr.innerHTML = `
    <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-gradient-to-br ${clip.creator.avatarGrad} text-sm font-bold text-white shadow-inner">${esc(clip.creator.name[0])}</span>
    <div class="min-w-0 flex-1">
      <a href="${esc(clip.creator.url)}" target="_blank" rel="noopener" class="block truncate text-sm font-semibold text-slate-900 hover:text-emerald-600">${esc(clip.creator.name)}</a>
      <div class="flex items-center gap-1.5 text-xs text-slate-500"><span class="truncate">${esc(clip.creator.handle)}</span><span class="text-slate-300">·</span><span class="inline-flex items-center gap-1">${platIcon(clip.platform)} ${esc(clip.platformLabel)}</span></div>
    </div>
    <div class="inline-flex shrink-0 items-center gap-1 rounded-full bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700">${upSvg()} ${clip.upvotes}</div>`;
  info.appendChild(cr);

  // caption
  info.appendChild(el('p','mt-2.5 text-sm font-medium text-slate-800','“'+esc(clip.caption)+'”'));

  // chips
  const chips = el('div','mt-2 flex flex-wrap items-center gap-1.5');
  chips.innerHTML = stanceChip(clip.stance) + accuracyChip(clip.accuracy);
  info.appendChild(chips);

  // context note (the heart)
  const ctx = el('div','mt-3 rounded-lg border-l-4 border-emerald-300 bg-emerald-50/60 p-3');
  ctx.innerHTML = `<div class="mb-1 text-[10px] font-bold uppercase tracking-wider text-emerald-700">Curator context note</div>
    <p class="text-[13px] leading-6 text-slate-700">${esc(clip.context)}</p>`;
  info.appendChild(ctx);

  // footer: section link + curatedBy/date
  const foot = el('div','mt-3 flex flex-wrap items-center justify-between gap-2 border-t border-slate-100 pt-2.5');
  const secLink = el('a','inline-flex items-center gap-1 rounded-full bg-slate-900 px-3 py-1 text-xs font-semibold text-white transition hover:bg-emerald-600');
  secLink.href = '#sec-'+clip.sectionId;
  secLink.innerHTML = `${arrowSvg()} ${esc(clip.sectionLabel)}`;
  secLink.addEventListener('click', (e)=>{
    e.preventDefault();
    const t = document.getElementById('sec-'+clip.sectionId);
    if(t && leftScrollEl){ leftScrollEl.scrollTo({top: t.offsetTop - 12, behavior:'smooth'}); highlightSection(clip.sectionId); }
  });
  foot.appendChild(secLink);
  foot.appendChild(el('div','text-[11px] text-slate-400',`Curated by <span class="font-medium text-slate-600">${esc(clip.curatedBy)}</span> · ${esc(clip.date)}`));
  info.appendChild(foot);

  card.appendChild(info);
  return card;
}

function buildSkeleton(){
  const card = el('article','snap-item mx-auto w-full max-w-md');
  card.innerHTML = `
    <div class="mx-auto aspect-[9/16] max-h-[68vh] max-w-[340px] w-full overflow-hidden rounded-xl">
      <div class="skel h-full w-full"></div>
    </div>
    <div class="mt-3 rounded-xl border border-slate-200 bg-white p-4">
      <div class="flex items-center gap-3"><div class="skel h-10 w-10 rounded-full"></div><div class="flex-1 space-y-2"><div class="skel h-3 w-2/5 rounded"></div><div class="skel h-2.5 w-1/4 rounded"></div></div></div>
      <div class="mt-3 space-y-2"><div class="skel h-3 w-full rounded"></div><div class="skel h-3 w-5/6 rounded"></div><div class="skel h-3 w-3/4 rounded"></div></div>
    </div>`;
  return card;
}

/* ---------- assemble ---------- */
document.addEventListener('DOMContentLoaded', ()=>{
  const app = document.getElementById('app');
  const split = el('div','grid h-full grid-cols-1 md:grid-cols-2');

  // LEFT
  const left = buildArticle();
  left.classList.add('min-h-0','border-r','border-slate-200','bg-white');
  split.appendChild(left);
  leftScrollEl = left.querySelector('.ctx-scroll');
  left.querySelectorAll('section[data-secid]').forEach(s=>{ sectionEls[s.dataset.secid]=s; });

  // RIGHT
  const right = el('div','flex h-full min-h-0 flex-col bg-slate-50');

  // right header with count + stats
  const rhead = el('div','shrink-0 border-b border-slate-200 bg-white/80 px-5 py-3 backdrop-blur');
  rhead.innerHTML = `
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-sm font-bold text-slate-900">Curated clips</span>
        <span id="countPill" class="rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-semibold text-emerald-700">${W.stats.loaded} of ${W.stats.totalClips}</span>
      </div>
      <div class="flex items-center gap-3 text-[11px] text-slate-500">
        <span>${W.stats.creatorCount} creators</span><span>·</span>
        <span>${W.stats.curatorCount} curators</span><span>·</span>
        <span class="inline-flex items-center gap-1 text-emerald-600">${upSvg()} ${W.stats.upvoteTotal.toLocaleString()}</span>
      </div>
    </div>
    <p class="mt-0.5 text-[11px] text-slate-400">Scroll-snap feed · synced ${esc(W.stats.synced)} · scroll → matching section highlights left</p>`;
  right.appendChild(rhead);

  // feed
  const feed = el('div','feed-scroll min-h-0 flex-1 space-y-8 overflow-y-auto px-4 py-6');
  W.clips.forEach(c => feed.appendChild(buildClipCard(c)));

  // sentinel
  const sentinel = el('div','h-4 w-full');
  sentinel.id = 'sentinel';
  feed.appendChild(sentinel);

  right.appendChild(feed);
  split.appendChild(right);
  app.appendChild(split);

  /* IntersectionObserver: highlight matching section as clip enters view */
  const seen = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      if(en.isIntersecting && en.target.dataset.secid){
        highlightSection(en.target.dataset.secid);
      }
    });
  }, { root: feed, threshold: 0.55 });
  feed.querySelectorAll('article[data-secid]').forEach(a=>seen.observe(a));

  /* Infinite scroll: append skeletons near the end, then "browse all" message */
  let exhausted = false;
  const loadMore = new IntersectionObserver((entries)=>{
    if(!entries[0].isIntersecting || exhausted) return;
    exhausted = true;
    // append a few skeletons to demonstrate scaling beyond the 14 shown
    const skels = [];
    for(let i=0;i<3;i++){ const s = buildSkeleton(); feed.insertBefore(s, sentinel); skels.push(s); }
    // then resolve into the curated-top message
    setTimeout(()=>{
      skels.forEach(s=>s.remove());
      const msg = el('div','mx-auto max-w-md rounded-2xl border border-dashed border-emerald-300 bg-emerald-50/50 px-6 py-8 text-center');
      msg.innerHTML = `
        <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <p class="text-sm font-semibold text-slate-800">You've reached the curated top picks</p>
        <p class="mt-1 text-xs text-slate-500">Showing the ${W.stats.loaded} highest-signal clips for this topic.</p>
        <button class="mt-4 inline-flex items-center gap-1.5 rounded-full bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-emerald-700">
          Browse all ${W.stats.totalClips} clips ${arrowSvg()}
        </button>`;
      feed.insertBefore(msg, sentinel);
    }, 1100);
  }, { root: feed, threshold: 0.1 });
  loadMore.observe(sentinel);

  // initial highlight
  if(W.clips[0]) highlightSection(W.clips[0].sectionId);
});
</script>
</body>
</html>
