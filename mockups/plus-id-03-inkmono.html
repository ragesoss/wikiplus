<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ · Plus ID 03 · Ink &amp; Indigo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+Pro:wght@600;700;900&display=swap" rel="stylesheet">
<script src="data/content.js"></script>
<style>
  html { scroll-behavior: smooth; }

  /* ---- Wikipedia article look (the "WIKI" world — unchanged, faithful) ---- */
  .wiki { background:#fff; color:#202122; }
  .wiki .wiki-title {
    font-family: 'Linux Libertine','Georgia','Times New Roman',serif;
    font-weight: 400; line-height: 1.15;
    border-bottom: 1px solid #a2a9b1; padding-bottom: .25em;
  }
  .wiki h2.wiki-h, .wiki h3.wiki-h, .wiki h4.wiki-h {
    font-family: 'Georgia','Times New Roman',serif;
    font-weight: 400; color:#000;
    border-bottom: 1px solid #a2a9b1; padding-bottom: .2em;
    scroll-margin-top: 5rem;
  }
  .wiki h2.wiki-h { font-size: 1.7rem; margin: 1.4em 0 .5em; }
  .wiki h3.wiki-h { font-size: 1.3rem; margin: 1.2em 0 .4em; border-bottom: none; }
  .wiki h4.wiki-h { font-size: 1.08rem; font-weight: 700; margin: 1em 0 .3em; border-bottom: none; }
  .wiki-prose { font-size: 15px; line-height: 1.7; color:#202122;
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  .wiki-prose p { margin: 0 0 .7em; }
  .wiki .wl { color:#3366cc; text-decoration: none; }
  .wiki .wl:hover { text-decoration: underline; }
  .wiki-fig {
    float: right; clear: right; width: 250px; max-width: 45%;
    margin: .4em 0 1em 1.4em; border: 1px solid #a2a9b1;
    background:#f8f9fa; padding: 3px; font-size: 11.5px; line-height:1.4; color:#54595d;
  }
  .wiki-fig img { display:block; width:100%; height:auto; }
  .wiki-fig figcaption { padding: 4px 2px 2px; }
  .clearfix::after { content:""; display:table; clear:both; }

  /* ---- PLUS identity: Ink & Indigo ---- */
  :root{
    --indigo:#676EB4; --violet:#5248AF; --teal:#2A8270; --teal-d:#1F6757;
    --blue:#1F6F95; --gold:#E5AB28; --red:#C44949;
    --ink:#2C2C2C; --ink2:#595959; --muted:#717171;
    --bg1:#F7F7F7; --bg2:#F0F1F3; --bd:#D9D9D9; --bd2:#979797;
  }
  body { font-family:'Open Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .plus-display { font-family:'Source Sans Pro','Arial Black',Helvetica,Arial,sans-serif; font-weight:900; letter-spacing:-.02em; line-height:.95; }
  .plus-head { font-family:'Source Sans Pro',Helvetica,Arial,sans-serif; }
  /* hard borders + solid offset shadows in indigo (single bold accent) */
  .ink-border { border:2px solid var(--ink); }
  .shadow-indigo { box-shadow:6px 6px 0 var(--indigo); }
  .shadow-indigo-sm { box-shadow:4px 4px 0 var(--indigo); }
  .shadow-indigo-xs { box-shadow:3px 3px 0 var(--indigo); }
  .shadow-ink-xs { box-shadow:2px 2px 0 var(--ink); }
  .press:hover { transform:translate(2px,2px); box-shadow:none !important; }
  .press { transition:transform .12s ease, box-shadow .12s ease; }
  ::selection { background:var(--gold); color:#000; }
  .scrollbar-thin::-webkit-scrollbar { height:8px; width:8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:99px; }
  .carousel { scroll-snap-type: x mandatory; }
  .carousel > * { scroll-snap-align: start; }
  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--gold); outline-offset: 3px; border-radius: 2px;
  }
</style>
</head>
<body class="bg-[#F7F7F7] text-[#2C2C2C] antialiased">
<div id="app"></div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var W = window.WIKIPLUS;
  var A = W.article, CLIPS = W.clips, STATS = W.stats;

  var SVG = {
    play: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M8 5v14l11-7z"/></svg>',
    up:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
    ext:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>',
    book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>'
  };

  function esc(s){ var d=document.createElement("div"); d.textContent=(s==null?"":s); return d.innerHTML; }

  // ---- accuracy semantics (never color alone — always paired with text label) ----
  // accurate -> teal; simplified/caveat/etc -> action blue; opinion/anecdotal/teaching/classroom -> gold
  function accStyle(acc){
    var a=(acc||"").toLowerCase();
    if(/opinion|anecdot|teaching|classroom/.test(a))
      return {bg:"#FBF1D6", tx:"#7A5A05", bd:"#E5AB28", dot:"#E5AB28"};        // gold
    if(/simplified|caveat|condensed|exam|definitional|big-picture|fast|conceptual|narrow|phenomenon|footage|primary/.test(a))
      return {bg:"#E2EEF3", tx:"#16455C", bd:"#1F6F95", dot:"#1F6F95"};        // action blue
    return {bg:"#DFEEEA", tx:"#185446", bd:"#2A8270", dot:"#2A8270"};          // teal = accurate
  }

  // wiki+ wordmark: "wiki" ink + accent "+" indigo
  function wordmark(extra, plusColor){
    return '<span class="plus-head font-bold tracking-tight '+(extra||'')+'">wiki<span style="color:'+(plusColor||'#676EB4')+'">+</span></span>';
  }

  // group clips
  var bySection = {}, general = [];
  CLIPS.forEach(function(c){
    if(c.general){ general.push(c); }
    else { (bySection[c.sectionId]=bySection[c.sectionId]||[]).push(c); }
  });
  function clipById(id){ for(var i=0;i<CLIPS.length;i++) if(CLIPS[i].id===id) return CLIPS[i]; }

  // ---- media frame (thumb + play; respects orientation) ----
  function mediaFrame(c){
    var vert = c.orientation === "vertical";
    var ratio = vert ? "aspect-[9/16]" : "aspect-video";
    var pid = "media-"+c.id;
    return ''
      + '<div id="'+pid+'" class="relative '+ratio+' w-full overflow-hidden bg-gradient-to-br '+c.thumbGrad+' group">'
      + '<img loading="lazy" src="'+esc(c.thumbnail)+'" alt="'+esc(c.alt||c.caption)+'" '
      +   'class="absolute inset-0 w-full h-full object-cover opacity-95 group-hover:opacity-100 transition" '
      +   'onerror="this.style.display=\'none\';this.parentElement.classList.add(\'bg-gradient-to-br\');">'
      + '<button data-play="'+c.id+'" aria-label="Play video: '+esc(c.caption)+'" '
      +   'class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/25 transition-colors">'
      +   '<span class="flex items-center justify-center w-14 h-14 rounded-full bg-white text-[#2C2C2C] ink-border shadow-indigo-xs group-hover:scale-110 transition-transform pl-0.5">'+SVG.play+'</span>'
      + '</button>'
      + '<span class="absolute top-2.5 left-2.5 px-2 py-0.5 text-[10px] plus-head font-bold uppercase tracking-wide bg-[#2C2C2C] text-white">'+esc(c.platformLabel)+'</span>'
      + (c.platform==="tiktok"
          ? '<span class="absolute bottom-2.5 right-2.5 px-2 py-0.5 text-[10px] font-bold bg-white text-[#2C2C2C] ink-border">Opens on TikTok &#8599;</span>'
          : '')
      + '</div>';
  }

  function chip(label, opts){
    return '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] plus-head font-bold uppercase tracking-wide" '
      + 'style="background:'+opts.bg+';color:'+opts.tx+';border:1.5px solid '+opts.bd+';">'+label+'</span>';
  }

  // ---- one clip card ----
  function clipCard(c){
    var vert = c.orientation === "vertical";
    var acc = accStyle(c.accuracy);
    var mediaW = vert ? "sm:w-[190px]" : "sm:w-[300px]";
    return ''
    + '<article class="bg-white ink-border shadow-indigo-sm overflow-hidden">'
    +   '<div class="flex flex-col sm:flex-row">'
    +     '<div class="'+mediaW+' shrink-0 border-b-2 sm:border-b-0 sm:border-r-2 border-[#2C2C2C]">'+mediaFrame(c)+'</div>'
    +     '<div class="flex-1 min-w-0 p-4 sm:p-5">'
    +       '<div class="flex items-center gap-2.5 mb-3">'
    +         '<span class="w-9 h-9 rounded-full bg-gradient-to-br '+c.creator.avatarGrad+' ink-border shrink-0" aria-hidden="true"></span>'
    +         '<div class="min-w-0">'
    +           '<a href="'+esc(c.creator.url)+'" target="_blank" rel="noopener" class="block text-sm plus-head font-bold text-[#2C2C2C] hover:text-[#5248AF] truncate">'+esc(c.creator.name)+'</a>'
    +           '<div class="text-[11px] font-semibold text-[#717171] truncate">'+esc(c.creator.handle)+'</div>'
    +         '</div>'
    +       '</div>'
    +       '<h4 class="plus-head text-[16px] font-bold leading-snug text-[#2C2C2C] mb-2.5">'+esc(c.caption)+'</h4>'
    +       '<div class="flex flex-wrap gap-1.5 mb-3">'
    +         chip(esc(c.stance), {bg:"#EAEBF5", tx:"#3B3F76", bd:"#676EB4"})
    +         + chip('<span class="w-2 h-2 rounded-full" style="background:'+acc.dot+'" aria-hidden="true"></span>'+esc(c.accuracy), acc)
    +       '</div>'
    +       '<div class="relative bg-[#F7F7F7] pl-3 pr-2 py-2 mb-3" style="border-left:4px solid var(--indigo);">'
    +         '<div class="text-[10px] plus-head font-bold uppercase tracking-[.18em] text-[#5248AF] mb-0.5">Curator note</div>'
    +         '<p class="text-[13.5px] leading-relaxed text-[#2C2C2C]">'+esc(c.context)+'</p>'
    +       '</div>'
    +       '<div class="flex flex-wrap items-center gap-x-3 gap-y-1.5 text-[11px] text-[#717171] font-semibold">'
    +         '<a href="#'+esc(c.sectionId)+'" class="inline-flex items-center gap-1 px-2 py-0.5 text-[10px] plus-head font-bold uppercase tracking-wide text-[#3B3F76]" style="border:1.5px solid var(--indigo);">&#8594; '+esc(c.sectionLabel)+'</a>'
    +         '<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-white text-[#2C2C2C] ink-border font-bold">'+SVG.up+'<span class="font-bold" style="color:#946d05">'+c.upvotes+'</span></span>'
    +         '<span>curated by <span class="font-bold text-[#595959]">'+esc(c.curatedBy)+'</span> &middot; '+esc(c.date)+'</span>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</article>';
  }

  // ---- General carousel (the single big indigo band) ----
  function generalCarousel(){
    if(!general.length) return "";
    var sorted = general.slice().sort(function(a,b){return b.upvotes-a.upvotes;});
    var cards = sorted.map(function(c){
      var vert = c.orientation === "vertical";
      var w = vert ? "w-[240px]" : "w-[360px]";
      return '<div class="'+w+' shrink-0">'+clipCard(c)+'</div>';
    }).join("");
    return ''
    + '<section id="general" data-toc="general" aria-labelledby="general-h" class="relative my-9 text-white ink-border shadow-indigo p-6 sm:p-7" style="background:var(--indigo);">'
    +   '<div class="flex items-end justify-between flex-wrap gap-4 mb-5">'
    +     '<div>'
    +       '<div class="text-[11px] plus-head font-bold uppercase tracking-[.28em] mb-1" style="color:var(--gold);">'+wordmark('text-white','#fff')+' &middot; general intros</div>'
    +       '<h2 id="general-h" class="plus-display text-4xl sm:text-5xl text-white">&#9654; Watch this first</h2>'
    +     '</div>'
    +     '<div class="flex items-center gap-3">'
    +       '<span class="plus-display text-6xl sm:text-7xl leading-none" style="color:var(--gold);">'+general.length+'</span>'
    +       '<span class="text-xs plus-head font-bold uppercase leading-tight text-white/90">whole&#8209;topic<br>intros</span>'
    +     '</div>'
    +   '</div>'
    +   '<div class="carousel scrollbar-thin flex gap-4 overflow-x-auto pb-2 -mx-1 px-1">'+cards+'</div>'
    +   '<div class="mt-4 text-right">'
    +     '<a href="'+esc(A.url)+'" target="_blank" rel="noopener" class="press inline-flex items-center gap-1.5 text-xs plus-head font-bold uppercase tracking-wide bg-white text-[#2C2C2C] px-3.5 py-2 ink-border shadow-ink-xs">See all '+STATS.totalClips+' clips '+SVG.ext+'</a>'
    +   '</div>'
    + '</section>';
  }

  // ---- inline section plus-block ----
  function sectionBlock(sec){
    var clips = bySection[sec.id] || [];
    if(!clips.length) return "";
    var sorted = clips.slice().sort(function(a,b){return b.upvotes-a.upvotes;});
    var cards = sorted.map(function(c){ return '<div>'+clipCard(c)+'</div>'; }).join("");
    var n = clips.length;
    return ''
    + '<aside aria-label="wiki+ videos for '+esc(sec.title)+'" class="my-8 bg-white ink-border shadow-indigo">'
    +   '<div class="flex items-center gap-4 px-5 py-4 border-b-2 border-[#2C2C2C]">'
    +     '<span class="plus-display text-5xl sm:text-6xl leading-none" style="color:var(--gold);">'+n+'</span>'
    +     '<div>'
    +       '<div class="text-[10px] plus-head font-bold uppercase tracking-[.28em] text-[#5248AF]">'+wordmark('','#676EB4')+' watch</div>'
    +       '<div class="plus-display text-2xl sm:text-3xl text-[#2C2C2C]">&#9654; Watch this for the '+esc(sec.title)+'</div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="p-4 sm:p-5 space-y-4 bg-[#F7F7F7]">'+cards+'</div>'
    + '</aside>';
  }

  // ---- article body (faithful wiki) ----
  function htag(level){ return level===2?"h2":level===3?"h3":"h4"; }
  function figure(img){
    if(!img) return "";
    return '<figure class="wiki-fig">'
      + '<img loading="lazy" src="'+esc(img.src)+'" alt="'+esc(img.alt||img.caption||"")+'">'
      + '<figcaption>'+esc(img.caption||"")+(img.credit?' <span class="text-[#a2a9b1]">&middot; '+esc(img.credit)+'</span>':'')+'</figcaption>'
      + '</figure>';
  }

  var bodyHtml = "";
  A.sections.forEach(function(s){
    var t = htag(s.level);
    bodyHtml += '<'+t+' id="'+s.id+'" class="wiki-h" data-toc="'+s.id+'">'+esc(s.title)+'</'+t+'>';
    var inner = figure(s.image) + (s.html||[]).map(function(p){return '<p>'+p+'</p>';}).join("");
    bodyHtml += '<div class="wiki-prose clearfix">'+inner+'</div>';
    bodyHtml += sectionBlock(s);
  });

  // ---- TOC (General first, chunky count tags) ----
  function tocBadge(n, special){
    var style = special
      ? 'background:var(--indigo);color:#fff;border:2px solid var(--ink);'
      : 'background:#fff;color:#2C2C2C;border:2px solid var(--ink);';
    return '<span class="shrink-0 inline-flex items-center justify-center min-w-[26px] h-6 px-1.5 text-[11px] plus-head font-bold" style="'+style+'">'+n+'</span>';
  }
  var tocItems = '<a href="#general" data-tocitem="general" class="toc-link group flex items-center justify-between gap-2 py-1.5 px-2 text-[13px] plus-head font-bold uppercase tracking-wide text-[#5248AF] hover:bg-[#EAEBF5] border-l-4 border-transparent transition">'
    + '<span class="truncate">&#9654; General</span>'
    + (general.length ? tocBadge(general.length, true) : '')
    + '</a>';
  A.sections.forEach(function(s){
    var n = (bySection[s.id]||[]).length;
    var pad = s.level===2 ? "pl-2" : (s.level===3 ? "pl-5" : "pl-8");
    var wt = s.level===2 ? "font-bold" : "font-semibold";
    tocItems += '<a href="#'+s.id+'" data-tocitem="'+s.id+'" class="toc-link group flex items-center justify-between gap-2 py-1 '+pad+' pr-2 text-[12.5px] '+wt+' text-[#595959] hover:bg-[#F0F1F3] border-l-4 border-transparent transition">'
      + '<span class="truncate">'+esc(s.title)+'</span>'
      + (n ? tocBadge(n, false) : '')
      + '</a>';
  });

  // ---- lead html (faithful wiki) ----
  var leadHtml = (A.lead_html||[]).map(function(p){return '<p>'+p+'</p>';}).join("");

  // ---- assemble ----
  document.getElementById("app").innerHTML = ''
  + '<header class="sticky top-0 z-30 bg-white border-b-2 border-[#2C2C2C]">'
  +   '<div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">'
  +     '<div class="flex items-center gap-3">'+wordmark('text-2xl text-[#2C2C2C]','#676EB4')+'<span class="hidden sm:inline w-px h-5 bg-[#D9D9D9]"></span><span class="hidden sm:inline text-[11px] plus-head font-bold uppercase tracking-[.22em] text-[#717171]">Ink &amp; Indigo</span></div>'
  +     '<a href="'+esc(A.url)+'" target="_blank" rel="noopener" class="flex items-center gap-1.5 text-[12px] font-semibold text-[#595959] hover:text-[#2C2C2C]">'+SVG.book+' From Wikipedia &middot; '+esc(A.license)+'</a>'
  +   '</div>'
  + '</header>'

  + '<div class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-8 items-start">'

  // ===== MAIN (wiki + plus) =====
  + '<main class="wiki min-w-0 my-8 p-6 sm:p-9 ink-border shadow-indigo">'
  +   '<h1 class="wiki-title text-4xl sm:text-5xl text-black mb-1">'+esc(A.title)+'</h1>'
  +   '<p class="text-[12.5px] text-[#717171] mb-5 mt-2">From <a class="wl" href="'+esc(A.url)+'" target="_blank" rel="noopener">Wikipedia</a>, the free encyclopedia &middot; '+esc(A.license)+'</p>'
  +   '<div class="wiki-prose clearfix">'+figure(A.leadImage)+leadHtml+'</div>'
  +   generalCarousel()
  +   bodyHtml
  +   '<footer class="mt-12 pt-5 border-t border-[#a2a9b1] text-[12px] text-[#717171]">'
  +     'Article text from <a class="wl" href="'+esc(A.url)+'" target="_blank" rel="noopener">'+esc(A.source)+'</a>, licensed '+esc(A.license)+'. Curated video context layered by the '+wordmark('text-[#595959]','#676EB4')+' community.'
  +   '</footer>'
  + '</main>'

  // ===== SIDEBAR =====
  + '<aside class="hidden lg:block my-8">'
  +   '<div class="sticky top-20 space-y-5">'

  // +plus infobox
  +     '<div class="bg-white ink-border shadow-indigo-sm p-4">'
  +       '<div class="text-[11px] plus-head font-bold uppercase tracking-[.26em] text-[#5248AF] mb-3">'+wordmark('','#676EB4')+' layer</div>'
  +       '<div class="grid grid-cols-3 gap-2 text-center">'
  +         '<div class="ink-border py-2.5"><div class="plus-display text-3xl" style="color:var(--gold);">'+STATS.totalClips+'</div><div class="text-[9px] plus-head font-bold uppercase tracking-wide text-[#595959] mt-0.5">videos</div></div>'
  +         '<div class="ink-border py-2.5"><div class="plus-display text-3xl" style="color:var(--gold);">'+STATS.creatorCount+'</div><div class="text-[9px] plus-head font-bold uppercase tracking-wide text-[#595959] mt-0.5">creators</div></div>'
  +         '<div class="ink-border py-2.5"><div class="plus-display text-3xl" style="color:var(--gold);">'+STATS.curatorCount+'</div><div class="text-[9px] plus-head font-bold uppercase tracking-wide text-[#595959] mt-0.5">curators</div></div>'
  +       '</div>'
  +       '<div class="mt-3 flex items-center gap-1.5 text-[11px] font-bold text-[#595959]"><span class="w-2 h-2 rounded-full animate-pulse" style="background:var(--teal);"></span> synced '+esc(STATS.synced)+'</div>'
  +     '</div>'

  // TOC / contents
  +     '<nav aria-label="Contents" class="bg-white ink-border shadow-indigo-sm">'
  +       '<div class="px-3 py-2 plus-display text-xl text-white" style="background:var(--ink);">CONTENTS</div>'
  +       '<div class="p-2 max-h-[60vh] overflow-y-auto scrollbar-thin">'+tocItems+'</div>'
  +     '</nav>'

  +   '</div>'
  + '</aside>'

  + '</div>'

  + '<div class="fixed bottom-4 right-4 z-40 px-3 py-1.5 bg-[#2C2C2C] text-white text-[11px] plus-head font-bold uppercase tracking-wide ink-border" style="border-color:var(--gold);box-shadow:3px 3px 0 var(--indigo);">Plus ID 03 &middot; <span style="color:var(--gold);">Ink &amp; Indigo</span></div>';

  // ---- interactions: play ----
  document.addEventListener("click", function(e){
    var pb = e.target.closest("[data-play]");
    if(pb){
      var c = clipById(pb.getAttribute("data-play"));
      if(!c) return;
      if(c.platform === "tiktok"){ window.open(c.watch_url, "_blank", "noopener"); return; }
      var frame = document.getElementById("media-"+c.id);
      frame.innerHTML = '<iframe class="absolute inset-0 w-full h-full" src="'+esc(c.embed_url)+'?autoplay=1" '
        + 'title="'+esc(c.caption)+'" frameborder="0" '
        + 'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
    }
  });

  // ---- scrollspy ----
  var links = {};
  document.querySelectorAll(".toc-link").forEach(function(a){ links[a.getAttribute("data-tocitem")] = a; });
  function setActive(id){
    Object.keys(links).forEach(function(k){
      var on = (k===id);
      links[k].style.borderLeftColor = on ? "#676EB4" : "transparent";
      links[k].style.background = on ? (k==="general" ? "#EAEBF5" : "#F0F1F3") : "";
    });
  }
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){
        var id = en.target.getAttribute("data-toc") || "general";
        setActive(id);
      }
    });
  }, { rootMargin: "-80px 0px -65% 0px", threshold: 0 });
  document.querySelectorAll("[data-toc]").forEach(function(t){ io.observe(t); });
});
</script>
</body>
</html>
