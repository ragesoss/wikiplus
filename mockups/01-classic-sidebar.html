<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ · Photosynthesis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/content.js"></script>
<style>
  .serif { font-family: Georgia, 'Times New Roman', Times, serif; }
  html { scroll-behavior: smooth; }
  .rail-scroll::-webkit-scrollbar { width: 8px; }
  .rail-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  @keyframes pulse-soft { 0%,100% { opacity: 1 } 50% { opacity: .5 } }
  .skel { animation: pulse-soft 1.6s ease-in-out infinite; }
</style>
</head>
<body class="bg-stone-50 text-stone-900">
<div id="app"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const W = window.WIKIPLUS;
  const A = W.article, CLIPS = W.clips, S = W.stats;
  const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h !== undefined) e.innerHTML = h; return e; };
  const SHOWN = 8;

  /* ---------- accuracy chip color logic ---------- */
  function accuracyClasses(acc) {
    const a = acc.toLowerCase();
    if (a.includes('opinion') || a.includes('anecdot') || a.includes('teaching')) return 'bg-amber-100 text-amber-800 ring-amber-200';
    if (a.includes('simplified') || a.includes('caveat') || a.includes('condensed') || a.includes('exam') || a.includes('definitional') || a.includes('big-picture') || a.includes('fast')) return 'bg-sky-100 text-sky-800 ring-sky-200';
    return 'bg-emerald-100 text-emerald-800 ring-emerald-200';
  }
  const dot = `<svg viewBox="0 0 8 8" class="w-2 h-2 inline-block mr-1"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>`;

  const icons = {
    play: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M8 5v14l11-7z"/></svg>`,
    up: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    ext: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    tt: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5"><path d="M16.5 5.8a4.8 4.8 0 0 1-3.3-1.3v8.6a5.5 5.5 0 1 1-5.5-5.5c.3 0 .6 0 .8.1v2.7a2.8 2.8 0 1 0 2 2.7V2h2.7a4.8 4.8 0 0 0 3.3 4z"/></svg>`,
    yt: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 4.9 12 4.9 12 4.9s-7 0-8.9.5A3 3 0 0 0 1 7.5 31 31 0 0 0 .5 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1c1.9.5 8.9.5 8.9.5s7 0 8.9-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.5 12 31 31 0 0 0 23 7.5zM9.8 15.3V8.7l5.7 3.3z"/></svg>`,
  };
  const platIcon = c => c.platform === 'tiktok' ? icons.tt : icons.yt;

  /* ===================== WORDMARK ===================== */
  function wordmark(extra='') {
    return `<span class="font-bold tracking-tight ${extra}">wiki<span class="text-emerald-600">+</span></span>`;
  }

  /* ===================== THUMBNAIL (with onerror fallback) ===================== */
  // builds a thumb frame; clipId used to find iframe target
  function thumbFrame(c, { ratioClass, big }) {
    const frame = el('div', `relative overflow-hidden bg-gradient-to-br ${c.thumbGrad} ${ratioClass} group`);
    frame.dataset.thumbFor = c.id;
    const img = el('img', 'absolute inset-0 w-full h-full object-cover');
    img.loading = 'lazy';
    img.src = c.thumbnail;
    img.alt = c.caption;
    img.onerror = function () { this.style.display = 'none'; }; // parent gradient shows through
    frame.appendChild(img);

    // platform badge
    const badge = el('span', 'absolute top-2 left-2 z-10 inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-black/65 text-white text-[10px] font-medium backdrop-blur',
      `${platIcon(c)}<span>${c.platformLabel}</span>`);
    frame.appendChild(badge);

    // orientation tag
    const ori = el('span', 'absolute top-2 right-2 z-10 px-1.5 py-0.5 rounded bg-black/55 text-white text-[9px] font-semibold tracking-wide',
      c.orientation === 'vertical' ? '9:16' : '16:9');
    frame.appendChild(ori);

    // play overlay
    const play = el('button', 'absolute inset-0 z-10 flex items-center justify-center');
    play.innerHTML = `<span class="w-12 h-12 rounded-full bg-white/90 text-stone-900 grid place-items-center shadow-lg group-hover:scale-110 transition">${icons.play}</span>`;
    if (c.platform === 'tiktok') {
      play.title = 'Open on TikTok';
      play.onclick = () => window.open(c.watch_url, '_blank');
      const openLbl = el('span', 'absolute bottom-2 left-1/2 -translate-x-1/2 z-10 text-[10px] text-white/90 font-medium bg-black/55 px-2 py-0.5 rounded-full', 'Open on TikTok ↗');
      frame.appendChild(openLbl);
    } else {
      play.title = 'Play here';
      play.onclick = () => {
        const iframe = el('iframe', 'absolute inset-0 w-full h-full z-20');
        iframe.src = `${c.embed_url}?autoplay=1`;
        iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
        iframe.allowFullscreen = true;
        frame.querySelectorAll('button, span, img').forEach(n => n.remove());
        frame.appendChild(iframe);
      };
    }
    frame.appendChild(play);
    return frame;
  }

  /* ===================== COMPACT CLIP CARD (rail) ===================== */
  function clipCard(c) {
    const card = el('article', 'rounded-xl bg-white ring-1 ring-stone-200 overflow-hidden shadow-sm hover:shadow-md transition');
    const ratio = c.orientation === 'vertical' ? 'aspect-[9/16] max-h-72 mx-auto w-auto' : 'aspect-video w-full';
    // thumb wrapper keeps vertical clips centered & not full-bleed
    const thumbWrap = el('div', c.orientation === 'vertical' ? 'bg-stone-900 flex justify-center' : '');
    thumbWrap.appendChild(thumbFrame(c, { ratioClass: ratio }));
    card.appendChild(thumbWrap);

    const body = el('div', 'p-3 space-y-2');

    // creator row
    const cr = el('div', 'flex items-center gap-2');
    cr.innerHTML = `
      <span class="w-7 h-7 rounded-full bg-gradient-to-br ${c.creator.avatarGrad} ring-1 ring-stone-200 shrink-0"></span>
      <div class="min-w-0 leading-tight">
        <a href="${c.creator.url}" target="_blank" class="block text-[13px] font-semibold text-stone-800 truncate hover:underline">${c.creator.name}</a>
        <div class="text-[11px] text-stone-500 truncate flex items-center gap-1">${c.creator.handle} · ${platIcon(c)} ${c.platformLabel}</div>
      </div>`;
    body.appendChild(cr);

    // caption
    body.appendChild(el('p', 'text-[13px] font-medium text-stone-900 leading-snug', c.caption));

    // chips
    const chips = el('div', 'flex flex-wrap gap-1.5');
    chips.appendChild(el('span', 'inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-stone-100 text-stone-700 ring-1 ring-stone-200', c.stance));
    chips.appendChild(el('span', `inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium ring-1 ${accuracyClasses(c.accuracy)}`, dot + c.accuracy));
    body.appendChild(chips);

    // context note (curator)
    const note = el('div', 'rounded-lg bg-amber-50/70 ring-1 ring-amber-100 p-2');
    note.innerHTML = `<div class="text-[10px] uppercase tracking-wide font-semibold text-amber-700/80 mb-0.5">Curator's context note</div>
      <p class="text-[12px] text-stone-700 leading-relaxed">${c.context}</p>`;
    body.appendChild(note);

    // section link
    const sec = el('a', 'inline-flex items-center gap-1 text-[12px] font-semibold text-emerald-700 hover:text-emerald-900 hover:underline');
    sec.href = '#sec-' + c.sectionId;
    sec.innerHTML = `${icons.arrow}<span>${c.sectionLabel}</span>`;
    body.appendChild(sec);

    // footer meta
    const foot = el('div', 'flex items-center justify-between pt-1 border-t border-stone-100 text-[11px] text-stone-500');
    foot.innerHTML = `
      <span class="inline-flex items-center gap-1 font-medium text-stone-600">${icons.up}${c.upvotes}</span>
      <span>by <span class="font-medium text-stone-600">${c.curatedBy}</span> · ${c.date}</span>`;
    body.appendChild(foot);

    card.appendChild(body);
    return card;
  }

  function skeletonCard() {
    const card = el('div', 'rounded-xl bg-white ring-1 ring-stone-200 overflow-hidden skel');
    card.innerHTML = `
      <div class="aspect-video bg-stone-200"></div>
      <div class="p-3 space-y-2">
        <div class="flex items-center gap-2"><div class="w-7 h-7 rounded-full bg-stone-200"></div><div class="h-3 w-24 bg-stone-200 rounded"></div></div>
        <div class="h-3 w-full bg-stone-200 rounded"></div>
        <div class="h-3 w-2/3 bg-stone-200 rounded"></div>
        <div class="flex gap-1.5"><div class="h-4 w-14 bg-stone-200 rounded-full"></div><div class="h-4 w-20 bg-stone-200 rounded-full"></div></div>
      </div>`;
    return card;
  }

  /* ===================== HEADER ===================== */
  const header = el('header', 'sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-stone-200');
  header.innerHTML = `
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        ${wordmark('text-xl')}
        <span class="text-stone-300">/</span>
        <span class="text-sm text-stone-500">Topic</span>
        <span class="text-sm font-semibold text-stone-800">${A.title}</span>
      </div>
      <div class="hidden sm:flex items-center gap-4 text-[12px] text-stone-500">
        <span><span class="font-semibold text-stone-700">${S.totalClips}</span> clips</span>
        <span><span class="font-semibold text-stone-700">${S.creatorCount}</span> creators</span>
        <span><span class="font-semibold text-stone-700">${S.curatorCount}</span> curators</span>
        <span class="inline-flex items-center gap-1 text-emerald-600"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>synced ${S.synced}</span>
      </div>
    </div>`;
  document.getElementById('app').appendChild(header);

  /* ===================== LAYOUT ===================== */
  const main = el('div', 'max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-[1fr_380px] gap-8');
  document.getElementById('app').appendChild(main);

  /* ---------- LEFT: article column ---------- */
  const article = el('main', 'min-w-0');

  // title + attribution
  const head = el('div', 'mb-5 pb-4 border-b border-stone-200');
  head.innerHTML = `
    <h1 class="serif text-4xl font-bold text-stone-900 leading-tight">${A.title}</h1>
    <p class="mt-2 text-sm text-stone-500">From <a href="${A.url}" target="_blank" class="text-emerald-700 hover:underline font-medium">Wikipedia</a> · ${A.license}</p>`;
  article.appendChild(head);

  // infobox card (floats right on wide article)
  const info = el('aside', 'sm:float-right sm:ml-6 mb-4 w-full sm:w-64 rounded-xl ring-1 ring-stone-200 bg-white shadow-sm overflow-hidden');
  info.innerHTML = `
    <div class="h-24 bg-gradient-to-br from-emerald-300 via-green-500 to-teal-700"></div>
    <div class="p-4 space-y-3">
      <h2 class="serif text-lg font-bold text-stone-900">${A.title}</h2>
      <dl class="text-[13px] space-y-1.5">
        <div class="flex justify-between gap-2"><dt class="text-stone-500">Source</dt><dd class="font-medium text-right">${A.source}</dd></div>
        <div class="flex justify-between gap-2"><dt class="text-stone-500">Wikidata</dt><dd class="font-medium text-right">${A.qid}</dd></div>
        <div class="flex justify-between gap-2"><dt class="text-stone-500">License</dt><dd class="font-medium text-right">${A.license}</dd></div>
        <div class="flex justify-between gap-2"><dt class="text-stone-500">Curated clips</dt><dd class="font-medium text-right">${S.totalClips}</dd></div>
      </dl>
      <a href="${A.url}" target="_blank" class="inline-flex items-center gap-1 text-[12px] font-semibold text-emerald-700 hover:underline">Read on Wikipedia ↗</a>
    </div>`;
  article.appendChild(info);

  // lead paragraphs
  A.lead.forEach(p => article.appendChild(el('p', 'serif text-[17px] leading-relaxed text-stone-800 mb-4', p)));

  // sections
  A.sections.forEach(s => {
    const sizes = { 2: 'text-2xl mt-8 pb-1 border-b border-stone-200', 3: 'text-xl mt-6', 4: 'text-lg mt-5' };
    const h = el('h' + s.level, `serif font-bold text-stone-900 ${sizes[s.level] || 'text-lg mt-4'}`, s.title);
    h.id = 'sec-' + s.id;
    h.style.scrollMarginTop = '4rem';
    article.appendChild(h);
    // count clips linking here
    const linked = CLIPS.filter(c => c.sectionId === s.id);
    if (linked.length) {
      const tag = el('a', 'inline-flex items-center gap-1 mt-2 mb-1 text-[12px] font-medium text-emerald-700 hover:underline');
      tag.href = '#rail';
      tag.innerHTML = `${icons.play.replace('w-6 h-6','w-3 h-3')} ${linked.length} curated clip${linked.length>1?'s':''} for this section`;
      article.appendChild(tag);
    }
    s.paras.forEach(p => article.appendChild(el('p', 'serif text-[16px] leading-relaxed text-stone-800 mt-3', p)));
  });

  main.appendChild(article);

  /* ---------- RIGHT: sticky clip rail ---------- */
  const railWrap = el('aside', 'lg:sticky lg:top-20 lg:self-start');
  railWrap.id = 'rail';
  const rail = el('div', 'rounded-2xl bg-stone-100/70 ring-1 ring-stone-200 p-3');

  const railHead = el('div', 'px-1 pb-3 mb-1 border-b border-stone-200');
  railHead.innerHTML = `
    <div class="flex items-center gap-2">
      ${wordmark('text-base')}
      <span class="text-sm font-semibold text-stone-800">Curated clips</span>
    </div>
    <p id="rail-count" class="text-[12px] text-stone-500 mt-0.5">showing ${SHOWN} of ${S.totalClips}</p>`;
  rail.appendChild(railHead);

  // scroll area
  const list = el('div', 'rail-scroll space-y-3 lg:max-h-[calc(100vh-12rem)] lg:overflow-y-auto pr-1 pt-3');
  CLIPS.slice(0, SHOWN).forEach(c => list.appendChild(clipCard(c)));
  rail.appendChild(list);

  // load more button + container for the rest
  const moreWrap = el('div', 'pt-3');
  const moreBtn = el('button', 'w-full py-2.5 rounded-xl bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 transition shadow-sm',
    `See all ${S.totalClips} clips · load more`);
  moreWrap.appendChild(moreBtn);
  rail.appendChild(moreWrap);

  moreBtn.onclick = () => {
    // append remaining curated clips
    CLIPS.slice(SHOWN).forEach(c => list.appendChild(clipCard(c)));
    // a couple skeletons to convey the larger set loading
    for (let i = 0; i < 3; i++) list.appendChild(skeletonCard());
    // top-picks message
    const msg = el('div', 'rounded-xl bg-emerald-50 ring-1 ring-emerald-100 p-3 text-center');
    msg.innerHTML = `<p class="text-[13px] font-semibold text-emerald-800">You've reached the curated top picks</p>
      <p class="text-[12px] text-emerald-700/80 mt-0.5">Browse all <span class="font-semibold">${S.totalClips}</span> clips for this topic</p>
      <button class="mt-2 text-[12px] font-semibold text-emerald-700 underline">Open full clip library →</button>`;
    list.appendChild(msg);
    document.getElementById('rail-count').textContent = `showing ${CLIPS.length} of ${S.totalClips}`;
    moreWrap.remove();
  };

  railWrap.appendChild(rail);
  main.appendChild(railWrap);

  /* ===================== VARIANT BADGE ===================== */
  const badge = el('div', 'fixed bottom-4 right-4 z-40 px-3 py-1.5 rounded-full bg-stone-900 text-white text-[11px] font-medium shadow-lg');
  badge.textContent = 'Variant 01 · Classic + Clip Rail';
  document.body.appendChild(badge);
});
</script>
</body>
</html>
