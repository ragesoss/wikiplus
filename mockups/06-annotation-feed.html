<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ · Context Feed</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/content.js"></script>
<style>
  html { scroll-behavior: smooth; }
  ::selection { background: #6ee7b7; }
  @keyframes pulsebg { 0%,100%{opacity:.55} 50%{opacity:1} }
  .skel { animation: pulsebg 1.4s ease-in-out infinite; }
</style>
</head>
<body class="bg-zinc-100 text-zinc-800 antialiased">
<div id="app"></div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var W = window.WIKIPLUS;
  var A = W.article, CLIPS = W.clips, STATS = W.stats;

  var SVG = {
    play: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7"><path d="M8 5v14l11-7z"/></svg>',
    up: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="w-4 h-4"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
    arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
    spark: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>',
    sync: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0 0 20.5 15"/></svg>',
    flag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/></svg>'
  };

  function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
  function wordmark(extra){ return '<span class="font-extrabold tracking-tight '+(extra||'')+'">wiki<span class="text-emerald-500">+</span></span>'; }

  function accClass(acc) {
    var a = (acc || "").toLowerCase();
    if (/opinion|anecdot|teaching context|classroom/.test(a)) return "bg-amber-100 text-amber-800 ring-amber-200";
    if (/caveat|simplified|condensed|exam|narrow|big-picture|fast/.test(a)) return "bg-sky-100 text-sky-800 ring-sky-200";
    return "bg-emerald-100 text-emerald-800 ring-emerald-200";
  }
  function dot(acc){
    var a=(acc||"").toLowerCase();
    if(/opinion|anecdot|teaching context|classroom/.test(a)) return "bg-amber-500";
    if(/caveat|simplified|condensed|exam|narrow|big-picture|fast/.test(a)) return "bg-sky-500";
    return "bg-emerald-500";
  }
  function parseDate(s){
    var m=s.match(/(\d+)\s*(day|week|hour)/);
    if(!m) return 0; var n=+m[1];
    return m[2]==="hour"?n: m[2]==="day"?n*24: n*24*7;
  }

  // section labels lookup + counts
  var bySection={};
  CLIPS.forEach(function(c){(bySection[c.sectionId]=bySection[c.sectionId]||[]).push(c);});

  function mediaFrame(c) {
    var vert = c.orientation === "vertical";
    var ratio = vert ? "aspect-[9/16]" : "aspect-video";
    var maxw = vert ? "sm:max-w-[230px]" : "";
    var pid = "media-" + c.id;
    return ''
      + '<div class="'+maxw+' w-full shrink-0">'
      + '<div id="'+pid+'" class="relative '+ratio+' rounded-xl overflow-hidden bg-gradient-to-br '+c.thumbGrad+' group shadow ring-1 ring-black/5">'
      + '<img loading="lazy" src="'+c.thumbnail+'" alt="'+esc(c.caption)+'" class="absolute inset-0 w-full h-full object-cover" '
      + 'onerror="this.style.display=\'none\';this.parentElement.classList.add(\'bg-gradient-to-br\');">'
      + '<button data-play="'+c.id+'" class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/25 transition-colors">'
      + '<span class="flex items-center justify-center w-14 h-14 rounded-full bg-white/90 text-zinc-900 shadow-lg group-hover:scale-110 transition-transform">'+SVG.play+'</span>'
      + '</button>'
      + '<span class="absolute top-2 left-2 px-2 py-0.5 rounded-md text-[10px] font-semibold bg-black/70 text-white backdrop-blur">'+esc(c.platformLabel)+'</span>'
      + (c.platform==="tiktok" ? '<span class="absolute bottom-2 right-2 px-2 py-0.5 rounded-md text-[10px] font-medium bg-white/85 text-zinc-700">Open on TikTok</span>' : '')
      + '</div></div>';
  }

  function chip(text,cls){ return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium ring-1 '+cls+'">'+text+'</span>'; }

  function card(c) {
    return ''
    + '<article class="bg-white rounded-2xl ring-1 ring-zinc-200 shadow-sm overflow-hidden">'
    + '<div class="flex items-center justify-between px-4 sm:px-5 pt-4">'
    +   '<div class="flex items-center gap-2.5 min-w-0">'
    +     '<span class="w-9 h-9 rounded-full bg-gradient-to-br '+c.creator.avatarGrad+' ring-2 ring-white shadow shrink-0"></span>'
    +     '<div class="min-w-0">'
    +       '<a href="'+c.creator.url+'" target="_blank" class="block text-sm font-semibold text-zinc-900 hover:text-emerald-700 truncate">'+esc(c.creator.name)+'</a>'
    +       '<div class="text-[11px] text-zinc-500 truncate">'+esc(c.creator.handle)+' · '+esc(c.platformLabel)+'</div>'
    +     '</div>'
    +   '</div>'
    +   '<button class="text-zinc-300 hover:text-amber-500 shrink-0" title="Flag for review">'+SVG.flag+'</button>'
    + '</div>'
    + '<div class="px-4 sm:px-5 pt-3 flex flex-col sm:flex-row gap-4">'
    +   mediaFrame(c)
    +   '<div class="flex-1 min-w-0">'
    +     '<div class="flex flex-wrap gap-1.5 mb-2.5">'
    +       chip('<span class="w-1.5 h-1.5 rounded-full bg-zinc-400"></span>'+esc(c.stance),'bg-zinc-100 text-zinc-600 ring-zinc-200')
    +       + chip('<span class="w-1.5 h-1.5 rounded-full '+dot(c.accuracy)+'"></span>'+esc(c.accuracy), accClass(c.accuracy))
    +     '</div>'
    +     '<p class="text-sm leading-relaxed text-zinc-700 mb-3"><span class="font-semibold text-emerald-700">Curator note. </span>'+esc(c.context)+'</p>'
    +     '<a href="'+A.url+'#'+c.sectionId+'" target="_blank" class="inline-flex items-center gap-1 text-[12px] font-medium text-emerald-700 bg-emerald-50 ring-1 ring-emerald-200 px-2.5 py-1 rounded-full hover:bg-emerald-100">'+SVG.arrow+' '+esc(c.sectionLabel)+'</a>'
    +   '</div>'
    + '</div>'
    + '<div class="flex items-center justify-between gap-3 px-4 sm:px-5 py-3.5 mt-3 border-t border-zinc-100">'
    +   '<button data-up="'+c.id+'" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-zinc-100 hover:bg-emerald-100 text-zinc-700 hover:text-emerald-700 text-sm font-semibold transition">'+SVG.up+'<span data-upn="'+c.id+'">'+c.upvotes+'</span></button>'
    +   '<div class="text-[11px] text-zinc-400 text-right">curated by <span class="font-medium text-zinc-600">'+esc(c.curatedBy)+'</span><br class="sm:hidden">'+'<span class="hidden sm:inline"> · </span>'+esc(c.date)+'</div>'
    + '</div>'
    + '</article>';
  }

  function skeleton() {
    return ''
    + '<div class="bg-white rounded-2xl ring-1 ring-zinc-200 p-5 skel">'
    +   '<div class="flex items-center gap-3 mb-4"><div class="w-9 h-9 rounded-full bg-zinc-200"></div><div class="space-y-2"><div class="h-3 w-28 bg-zinc-200 rounded"></div><div class="h-2.5 w-20 bg-zinc-200 rounded"></div></div></div>'
    +   '<div class="flex gap-4"><div class="w-28 h-28 bg-zinc-200 rounded-xl shrink-0"></div><div class="flex-1 space-y-2.5"><div class="h-3 w-3/4 bg-zinc-200 rounded"></div><div class="h-3 w-full bg-zinc-200 rounded"></div><div class="h-3 w-5/6 bg-zinc-200 rounded"></div><div class="h-3 w-2/3 bg-zinc-200 rounded"></div></div></div>'
    + '</div>';
  }

  // ---- left nav ----
  var sectionNav = A.sections.map(function(s){
    var n=(bySection[s.id]||[]).length;
    var pad = s.level===2?"":(s.level===3?"pl-3":"pl-6");
    return '<a href="'+A.url+'#'+s.id+'" target="_blank" class="group flex items-center justify-between gap-2 py-1 '+pad+' text-[12px] text-zinc-500 hover:text-emerald-700">'
      + '<span class="truncate">'+esc(s.title)+'</span>'
      + (n?'<span class="shrink-0 inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700 group-hover:bg-emerald-500 group-hover:text-white transition">'+n+'</span>':'')
      + '</a>';
  }).join("");

  function statChip(label,val){ return '<div class="rounded-lg bg-zinc-50 ring-1 ring-zinc-200 px-2.5 py-2 text-center"><div class="text-base font-extrabold text-zinc-900 leading-none">'+val+'</div><div class="text-[10px] text-zinc-500 mt-1">'+label+'</div></div>'; }

  document.getElementById("app").innerHTML = ''
  + '<header class="sticky top-0 z-30 bg-white/85 backdrop-blur border-b border-zinc-200">'
  +   '<div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">'
  +     '<div class="flex items-center gap-2">'+wordmark('text-xl text-zinc-900')+'<span class="hidden sm:inline text-zinc-300">/</span><span class="hidden sm:inline text-sm text-zinc-500">Context Feed</span></div>'
  +     '<a href="'+A.url+'" target="_blank" class="text-[12px] text-zinc-500 hover:text-emerald-700">From Wikipedia · '+esc(A.license)+'</a>'
  +   '</div>'
  + '</header>'

  + '<div class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-8 py-8">'

  // LEFT sticky nav
  + '<aside class="hidden lg:block">'
  +   '<div class="sticky top-20 space-y-4">'
  +     '<div class="rounded-2xl bg-white ring-1 ring-zinc-200 shadow-sm p-5">'
  +       '<div class="text-[11px] font-medium text-emerald-600 uppercase tracking-wide mb-1">'+esc(A.source)+'</div>'
  +       '<a href="'+A.url+'" target="_blank" class="block text-xl font-extrabold text-zinc-900 hover:text-emerald-700 mb-2">'+esc(A.title)+'</a>'
  +       '<p class="text-[12px] text-zinc-500 leading-relaxed line-clamp-5">'+esc(A.lead[0])+'</p>'
  +       '<a href="'+A.url+'" target="_blank" class="inline-block mt-2 text-[11px] font-medium text-emerald-700 hover:underline">Read full article &rarr;</a>'
  +     '</div>'
  +     '<div class="rounded-2xl bg-white ring-1 ring-zinc-200 shadow-sm p-5">'
  +       '<div class="grid grid-cols-3 gap-2 mb-4">'
  +         statChip('clips', STATS.totalClips) + statChip('creators', STATS.creatorCount) + statChip('curators', STATS.curatorCount)
  +       '</div>'
  +       '<div class="flex items-center gap-1.5 text-[11px] text-zinc-400 mb-3">'+SVG.sync+' '+STATS.upvoteTotal.toLocaleString()+' upvotes · synced '+esc(STATS.synced)+'</div>'
  +       '<div class="text-[11px] font-semibold text-zinc-700 uppercase tracking-wide mb-1 border-t border-zinc-100 pt-3">Sections</div>'
  +       '<nav class="max-h-[42vh] overflow-y-auto pr-1">'+sectionNav+'</nav>'
  +     '</div>'
  +   '</div>'
  + '</aside>'

  // MAIN feed
  + '<main class="min-w-0">'
  +   '<div class="flex flex-wrap items-center justify-between gap-3 mb-5">'
  +     '<div>'
  +       '<h1 class="text-2xl font-extrabold text-zinc-900 flex items-center gap-2">'+SVG.spark+' Context Feed</h1>'
  +       '<p class="text-[12px] text-zinc-500 mt-0.5" id="loaded-count"><span class="font-semibold text-zinc-700">'+STATS.loaded+'</span> of '+STATS.totalClips+' clips loaded · sorted by curators</p>'
  +     '</div>'
  +     '<div class="inline-flex rounded-full bg-white ring-1 ring-zinc-200 p-1 shadow-sm" id="sortbar">'
  +       '<button data-sort="top" class="px-3 py-1.5 rounded-full text-[12px] font-semibold transition bg-emerald-500 text-white">Top</button>'
  +       '<button data-sort="newest" class="px-3 py-1.5 rounded-full text-[12px] font-semibold transition text-zinc-600 hover:text-zinc-900">Newest</button>'
  +       '<button data-sort="debated" class="px-3 py-1.5 rounded-full text-[12px] font-semibold transition text-zinc-600 hover:text-zinc-900">Most debated</button>'
  +     '</div>'
  +   '</div>'
  +   '<div id="feed" class="space-y-5"></div>'
  +   '<div id="sentinel" class="py-8"></div>'
  + '</main>'

  + '</div>'
  + '<div class="fixed bottom-4 right-4 z-40 px-3 py-1.5 rounded-full bg-zinc-900 text-white text-[11px] font-semibold shadow-lg ring-1 ring-white/10">Variant 06 · Context Feed</div>';

  // ---- sorting + render ----
  var feed = document.getElementById("feed");
  function sorted(mode){
    var arr = CLIPS.slice();
    if(mode==="newest") arr.sort(function(a,b){return parseDate(a.date)-parseDate(b.date);});
    else if(mode==="debated") arr.sort(function(a,b){ // proxy: closeness to mid + amber/caveat first
      function score(c){var caveat=/opinion|anecdot|teaching|classroom|simplified|caveat/.test((c.accuracy+c.stance).toLowerCase())?1:0; return caveat*1000 + c.upvotes;}
      return score(b)-score(a);
    });
    else arr.sort(function(a,b){return b.upvotes-a.upvotes;});
    return arr;
  }
  function render(mode){ feed.innerHTML = sorted(mode).map(card).join(""); }
  render("top");

  // ---- infinite scroll: append skeletons then end message ----
  var sentinel = document.getElementById("sentinel");
  var phase = 0; // 0 = ready to load skeletons, 1 = skeletons shown, 2 = ended
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(!en.isIntersecting) return;
      if(phase===0){
        phase=1;
        sentinel.innerHTML = '<div class="space-y-5">'+skeleton()+skeleton()+skeleton()+'</div>';
        setTimeout(function(){
          if(phase!==1) return;
          phase=2;
          observer.disconnect();
          sentinel.innerHTML = ''
            + '<div class="text-center py-6 px-5 rounded-2xl bg-white ring-1 ring-zinc-200 shadow-sm">'
            +   '<div class="flex items-center justify-center gap-2 text-emerald-600 mb-1">'+SVG.spark+'<span class="font-bold text-zinc-800">You\'ve reached the curated top picks</span></div>'
            +   '<p class="text-[13px] text-zinc-500">Showing the '+STATS.loaded+' best-reviewed clips. '+(STATS.totalClips-STATS.loaded)+' more await across all sections.</p>'
            +   '<button class="mt-3 inline-flex items-center gap-1.5 px-4 py-2 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-semibold transition">Browse all '+STATS.totalClips+' clips '+'&rarr;</button>'
            + '</div>';
        }, 1100);
      }
    });
  }, { rootMargin: "200px" });
  observer.observe(sentinel);

  // ---- interactions ----
  function clipById(id){ for(var i=0;i<CLIPS.length;i++) if(CLIPS[i].id===id) return CLIPS[i]; }
  document.addEventListener("click", function(e){
    var pb = e.target.closest("[data-play]");
    if(pb){
      var c=clipById(pb.getAttribute("data-play"));
      if(c.platform==="tiktok"){ window.open(c.watch_url,"_blank"); return; }
      var frame=document.getElementById("media-"+c.id);
      frame.innerHTML='<iframe class="absolute inset-0 w-full h-full" src="'+c.embed_url+'?autoplay=1" title="'+esc(c.caption)+'" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
      return;
    }
    var ub = e.target.closest("[data-up]");
    if(ub){
      var id=ub.getAttribute("data-up");
      var span=document.querySelector('[data-upn="'+id+'"]');
      if(ub.dataset.voted){ span.textContent=+span.textContent-1; delete ub.dataset.voted; ub.classList.remove("bg-emerald-100","text-emerald-700"); }
      else { span.textContent=+span.textContent+1; ub.dataset.voted="1"; ub.classList.add("bg-emerald-100","text-emerald-700"); }
      return;
    }
    var sb = e.target.closest("[data-sort]");
    if(sb){
      document.querySelectorAll("#sortbar button").forEach(function(b){ b.className="px-3 py-1.5 rounded-full text-[12px] font-semibold transition text-zinc-600 hover:text-zinc-900"; });
      sb.className="px-3 py-1.5 rounded-full text-[12px] font-semibold transition bg-emerald-500 text-white";
      render(sb.getAttribute("data-sort"));
      return;
    }
  });
});
</script>
</body>
</html>
