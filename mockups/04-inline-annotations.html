<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiki+ · Inline Context</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/content.js"></script>
<style>
  html { scroll-behavior: smooth; }
  ::selection { background: #6ee7b7; }
  .wp-prose p { margin-bottom: 0.85rem; line-height: 1.75; }
</style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased">
<div id="app"></div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var W = window.WIKIPLUS;
  var A = W.article, CLIPS = W.clips, STATS = W.stats;
  var SVG = {
    play: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7"><path d="M8 5v14l11-7z"/></svg>',
    up: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
    ext: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>',
    arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
    book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
    spark: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>'
  };

  function accClass(acc) {
    var a = (acc || "").toLowerCase();
    if (/opinion|anecdot|teaching context|classroom/.test(a)) return "bg-amber-100 text-amber-800 ring-amber-200";
    if (/caveat|simplified|condensed|exam|narrow|big-picture|fast/.test(a)) return "bg-sky-100 text-sky-800 ring-sky-200";
    return "bg-emerald-100 text-emerald-800 ring-emerald-200";
  }
  function dot(acc){
    var a=(acc||"").toLowerCase();
    if(/opinion|anecdot|teaching context|classroom/.test(a)) return "bg-amber-500";
    if(/caveat|simplified|condensed|exam|narrow|big-picture|fast/.test(a)) return "bg-sky-500";
    return "bg-emerald-500";
  }
  function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

  // group clips by section
  var bySection = {};
  CLIPS.forEach(function(c){ (bySection[c.sectionId] = bySection[c.sectionId] || []).push(c); });

  // ---- wordmark ----
  function wordmark(extra){ return '<span class="font-extrabold tracking-tight '+(extra||'')+'">wiki<span class="text-emerald-500">+</span></span>'; }

  // ---- thumbnail / player ----
  function mediaFrame(c, active) {
    var vert = c.orientation === "vertical";
    var ratio = vert ? "aspect-[9/16]" : "aspect-video";
    var maxw = vert ? "max-w-[210px]" : "";
    var pid = "media-" + c.id;
    var html = ''
      + '<div class="'+maxw+' w-full">'
      + '<div id="'+pid+'" class="relative '+ratio+' rounded-xl overflow-hidden bg-gradient-to-br '+c.thumbGrad+' group shadow-sm ring-1 ring-black/5">'
      + '<img loading="lazy" src="'+c.thumbnail+'" alt="'+esc(c.caption)+'" class="absolute inset-0 w-full h-full object-cover" '
      + 'onerror="this.style.display=\'none\';this.parentElement.classList.add(\'bg-gradient-to-br\');">'
      + '<button data-play="'+c.id+'" class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/25 transition-colors">'
      + '<span class="flex items-center justify-center w-14 h-14 rounded-full bg-white/90 text-stone-900 shadow-lg group-hover:scale-110 transition-transform">'+SVG.play+'</span>'
      + '</button>'
      + '<span class="absolute top-2 left-2 px-2 py-0.5 rounded-md text-[10px] font-semibold bg-black/70 text-white backdrop-blur">'+esc(c.platformLabel)+'</span>'
      + (c.platform==="tiktok" ? '<span class="absolute bottom-2 right-2 px-2 py-0.5 rounded-md text-[10px] font-medium bg-white/85 text-stone-700">Opens on TikTok '+'</span>' : '')
      + '</div></div>';
    return html;
  }

  function chip(text, cls){ return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium ring-1 '+cls+'">'+text+'</span>'; }

  // ---- a single inline clip card ----
  function clipCard(c) {
    return ''
    + '<div class="flex gap-4 flex-col sm:flex-row">'
    + mediaFrame(c)
    + '<div class="flex-1 min-w-0">'
    +   '<div class="flex items-center gap-2.5 mb-2">'
    +     '<span class="w-8 h-8 rounded-full bg-gradient-to-br '+c.creator.avatarGrad+' ring-2 ring-white shadow shrink-0"></span>'
    +     '<div class="min-w-0">'
    +       '<a href="'+c.creator.url+'" target="_blank" class="block text-sm font-semibold text-stone-800 hover:text-emerald-700 truncate">'+esc(c.creator.name)+'</a>'
    +       '<div class="text-[11px] text-stone-500 truncate">'+esc(c.creator.handle)+' · '+esc(c.platformLabel)+'</div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="flex flex-wrap gap-1.5 mb-2">'
    +     chip('<span class="w-1.5 h-1.5 rounded-full bg-stone-400"></span>'+esc(c.stance),'bg-stone-100 text-stone-600 ring-stone-200')
    +     + chip('<span class="w-1.5 h-1.5 rounded-full '+dot(c.accuracy)+'"></span>'+esc(c.accuracy), accClass(c.accuracy))
    +   '</div>'
    +   '<p class="text-[13.5px] leading-relaxed text-stone-700 mb-2.5"><span class="font-semibold text-emerald-700">Curator note. </span>'+esc(c.context)+'</p>'
    +   '<div class="flex flex-wrap items-center gap-x-3 gap-y-1.5 text-[11px] text-stone-500">'
    +     '<a href="#'+c.sectionId+'" class="inline-flex items-center gap-1 font-medium text-emerald-700 hover:underline">'+SVG.arrow+' '+esc(c.sectionLabel)+'</a>'
    +     '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-stone-100 text-stone-600 font-medium">'+SVG.up+' '+c.upvotes+'</span>'
    +     '<span>added by <span class="font-medium text-stone-600">'+esc(c.curatedBy)+'</span> · '+esc(c.date)+'</span>'
    +   '</div>'
    + '</div>'
    + '</div>';
  }

  // ---- context block after a section ----
  function contextBlock(secId, secLabel) {
    var clips = bySection[secId] || [];
    if (!clips.length) return "";
    var sorted = clips.slice().sort(function(a,b){return b.upvotes-a.upvotes;});
    var inline = sorted.slice(0,2), rest = sorted.slice(2);
    var html = ''
      + '<aside class="my-7 rounded-2xl border-l-4 border-emerald-400 bg-emerald-50/60 ring-1 ring-emerald-100 overflow-hidden">'
      + '<div class="flex items-center justify-between px-5 pt-4 pb-3 border-b border-emerald-100/80">'
      +   '<div class="flex items-center gap-2 text-emerald-800">'+SVG.spark+wordmark('text-sm')+'<span class="text-sm font-semibold"> context</span></div>'
      +   '<span class="text-[11px] font-medium text-emerald-700 bg-white/70 px-2 py-0.5 rounded-full ring-1 ring-emerald-200">'+clips.length+' clip'+(clips.length>1?'s':'')+' for this section</span>'
      + '</div>'
      + '<div class="px-5 py-4 space-y-5">';
    inline.forEach(function(c){ html += '<div class="reveal-anchor">'+clipCard(c)+'</div>'; });
    html += '</div>';
    if (rest.length) {
      var moreId = "more-"+secId;
      html += '<div id="'+moreId+'-extra" class="hidden px-5 pb-4 space-y-5 border-t border-emerald-100/80 pt-4"></div>';
      html += '<div class="px-5 pb-4"><button data-more="'+secId+'" data-moreid="'+moreId+'" '
        + 'class="w-full text-center text-sm font-semibold text-emerald-700 hover:text-emerald-900 bg-white/70 hover:bg-white rounded-lg py-2.5 ring-1 ring-emerald-200 transition">'
        + '+ '+rest.length+' more clip'+(rest.length>1?'s':'')+' for this section '+'&rarr;</button></div>';
    }
    html += '</aside>';
    return html;
  }

  // ---- article body ----
  function tag(level){ return level===2?"h2":level===3?"h3":"h4"; }
  function tagCls(level){
    if(level===2) return "text-2xl font-bold text-stone-900 mt-10 mb-3 pb-2 border-b border-stone-200 scroll-mt-24";
    if(level===3) return "text-xl font-semibold text-stone-800 mt-7 mb-2 scroll-mt-24";
    return "text-lg font-semibold text-stone-700 mt-5 mb-2 scroll-mt-24";
  }

  var leadHtml = A.lead.map(function(p){return '<p>'+esc(p)+'</p>';}).join("");
  var bodyHtml = "";
  A.sections.forEach(function(s){
    var t = tag(s.level);
    bodyHtml += '<'+t+' id="'+s.id+'" class="'+tagCls(s.level)+'">'+esc(s.title)+'</'+t+'>';
    bodyHtml += '<div class="wp-prose text-[15px] text-stone-700">'+s.paras.map(function(p){return '<p>'+esc(p)+'</p>';}).join("")+'</div>';
    bodyHtml += contextBlock(s.id, s.title);
  });

  // ---- right TOC ----
  var tocItems = A.sections.map(function(s){
    var n = (bySection[s.id]||[]).length;
    var pad = s.level===2?"pl-0":(s.level===3?"pl-3":"pl-6");
    return '<a href="#'+s.id+'" class="group flex items-center justify-between gap-2 py-1 '+pad+' text-[12.5px] text-stone-500 hover:text-emerald-700 transition">'
      + '<span class="truncate">'+esc(s.title)+'</span>'
      + (n? '<span class="shrink-0 inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700 group-hover:bg-emerald-500 group-hover:text-white transition">'+n+'</span>':'')
      + '</a>';
  }).join("");

  // ---- assemble ----
  document.getElementById("app").innerHTML = ''
  + '<header class="sticky top-0 z-30 bg-white/85 backdrop-blur border-b border-stone-200">'
  +   '<div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">'
  +     '<div class="flex items-center gap-2">'+wordmark('text-xl text-stone-900')+'<span class="hidden sm:inline text-stone-300">/</span><span class="hidden sm:inline text-sm text-stone-500">Inline Context</span></div>'
  +     '<a href="'+A.url+'" target="_blank" class="flex items-center gap-1.5 text-[12px] text-stone-500 hover:text-emerald-700">'+SVG.book+' From Wikipedia · '+esc(A.license)+'</a>'
  +   '</div>'
  + '</header>'

  + '<div class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-[1fr_260px] gap-8">'

  // main column
  + '<main class="min-w-0 py-8">'
  +   '<div class="mb-2 text-[12px] font-medium text-emerald-600 uppercase tracking-wide">'+esc(A.source)+' · '+esc(A.qid)+'</div>'
  +   '<h1 class="text-4xl font-extrabold text-stone-900 tracking-tight mb-3">'+esc(A.title)+'</h1>'
  +   '<div class="flex flex-wrap items-center gap-2 mb-5 text-[12px]">'
  +     '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 font-medium">'+SVG.spark+STATS.totalClips+' curated clips across this article</span>'
  +     '<span class="px-2.5 py-1 rounded-full bg-stone-100 text-stone-600">'+STATS.creatorCount+' creators · '+STATS.curatorCount+' curators</span>'
  +     '<span class="px-2.5 py-1 rounded-full bg-stone-100 text-stone-600">synced '+esc(STATS.synced)+'</span>'
  +   '</div>'
  +   '<div class="wp-prose text-[15.5px] text-stone-700 leading-relaxed">'+leadHtml+'</div>'
  +   bodyHtml
  +   '<footer class="mt-12 pt-6 border-t border-stone-200 text-[12px] text-stone-400">'
  +     'Article text from <a href="'+A.url+'" target="_blank" class="text-emerald-600 hover:underline">'+esc(A.source)+'</a>, licensed '+esc(A.license)+'. Curated video context layered by the '+'wiki+ community.'
  +   '</footer>'
  + '</main>'

  // right TOC
  + '<aside class="hidden lg:block py-8">'
  +   '<div class="sticky top-20">'
  +     '<div class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm">'
  +       '<div class="flex items-center gap-1.5 text-[13px] font-bold text-stone-800 mb-1">'+SVG.spark+STATS.totalClips+' curated clips</div>'
  +       '<div class="text-[11px] text-stone-400 mb-3">across this article · count per section</div>'
  +       '<nav class="border-t border-stone-100 pt-2 max-h-[68vh] overflow-y-auto pr-1">'+tocItems+'</nav>'
  +     '</div>'
  +   '</div>'
  + '</aside>'

  + '</div>'

  + '<div class="fixed bottom-4 right-4 z-40 px-3 py-1.5 rounded-full bg-stone-900 text-white text-[11px] font-semibold shadow-lg ring-1 ring-white/10">Variant 04 · Inline Context</div>';

  // ---- interactions ----
  function clipById(id){ for(var i=0;i<CLIPS.length;i++) if(CLIPS[i].id===id) return CLIPS[i]; }

  document.addEventListener("click", function(e){
    var pb = e.target.closest("[data-play]");
    if (pb) {
      var c = clipById(pb.getAttribute("data-play"));
      if (c.platform === "tiktok") { window.open(c.watch_url, "_blank"); return; }
      var frame = document.getElementById("media-"+c.id);
      frame.innerHTML = '<iframe class="absolute inset-0 w-full h-full" src="'+c.embed_url+'?autoplay=1" '
        + 'title="'+esc(c.caption)+'" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
      return;
    }
    var mb = e.target.closest("[data-more]");
    if (mb) {
      var secId = mb.getAttribute("data-more");
      var box = document.getElementById(mb.getAttribute("data-moreid")+"-extra");
      var sorted = (bySection[secId]||[]).slice().sort(function(a,b){return b.upvotes-a.upvotes;}).slice(2);
      box.innerHTML = sorted.map(function(c){return clipCard(c);}).join("");
      box.classList.remove("hidden");
      mb.parentElement.remove();
      return;
    }
  });
});
</script>
</body>
</html>
