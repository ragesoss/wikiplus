name: Deploy to GitHub Pages

# The cloud, mobile-drivable loop: push → build the static export → publish to
# Pages, no server to operate. (Operations role; see docs/AGENT_OPERATING_MODEL.md.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          # Project pages are served under /<repo>; basePath must match.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Baked into the static bundle (NEXT_PUBLIC_); referrer-restricted in the Cloud console, so
          # bundle-visible is by design. Repo secret; unset in local/cloud builds → search must no-op then.
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - run: touch out/.nojekyll
      # SPA fallback for arbitrary title routes (/topic/<Title>): the canonical
      # Topic URL is title-based (no QID in the bar), so most titles have no
      # pre-built page in the static export. GitHub Pages serves 404.html for those;
      # making it a copy of the Topic SPA shell lets the client router read the title
      # from location.pathname and render — no QID, no redirect (ARCHITECTURE routing).
      - run: cp out/topic/index.html out/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
