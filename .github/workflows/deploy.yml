name: Deploy to GitHub Pages

# PAUSED as of issue #37 (drop `output:'export'` → Node SSR server).
#
# wiki+ no longer builds a static export, so `yarn build` no longer emits `out/`. This
# workflow's `yarn build` + `upload-pages-artifact path: out` would now fail / publish a
# broken-or-empty Pages artifact. The push-to-`main` auto-deploy is therefore DISABLED:
# the trigger is `workflow_dispatch` ONLY, so `main` never auto-attempts a static-export
# Pages deploy. (This change is verified locally and not live-deployable by design.)
#
# RE-ENABLING is issue A.2 (#35 §A.2): provision the self-hosted VPS + Docker Compose +
# Caddy + Cloudflare host and wire auto-deploy of the Node server against IT — NOT GitHub
# Pages. This whole Pages-specific workflow is expected to be replaced there, not revived.
# The cloud, mobile-drivable prompt→staging loop resumes at that point.

on:
  # push: { branches: [main] }  # DISABLED (#37) — re-wired against the VPS host in A.2.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          # Project pages are served under /<repo>; basePath must match.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Baked into the static bundle (NEXT_PUBLIC_); referrer-restricted in the Cloud console, so
          # bundle-visible is by design. Repo secret; unset in local/cloud builds → search must no-op then.
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - run: touch out/.nojekyll
      # SPA fallback: GitHub Pages serves out/404.html for any path with no pre-built
      # page. As of issue #13 the export's own `app/not-found.tsx` IS that fallback —
      # a superset of the old Topic-shell copy: it runs the bare-path → /topic/<Title>/
      # redirect AND, for every other unmatched path (notably unseeded /topic/<Title>/
      # title routes), renders TopicView, which reads the title from location.pathname
      # and renders. No redirect, no QID in the bar (ARCHITECTURE "Prototype phase →
      # routing"). We therefore NO LONGER overwrite out/404.html with out/topic/index.html;
      # `next build` already emits the correct out/404.html from app/not-found.tsx.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
