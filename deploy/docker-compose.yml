# wiki+ prototype stack (issue A.2 / #42; Postgres added in issue B / #45) — runs ON the
# Linode Nanode at /opt/wikiplus.
#
# Scope NOW: app (the Next.js Node SSR server, pulled from GHCR) + caddy (TLS + reverse
# proxy) + postgres (the shared, multi-user data store, issue #45) + a one-shot migrate
# service that applies Drizzle migrations + the seed on deploy.
#
# The box NEVER builds: `app.image` is the prebuilt GHCR image that CI pushes. Deploy is
# `docker compose pull && docker compose up -d` (run by the SSH deploy job, or by hand from
# the runbook). See ../Dockerfile and ../.github/workflows/deploy.yml.
#
# SECRETS (issue #45 — set on the box once, see docs/ops/vps-setup.md):
#   - secrets/postgres_password  — the Postgres superuser password (Docker secret, file-based;
#     NEVER inline in this file). Postgres reads it via POSTGRES_PASSWORD_FILE; the app +
#     migrate build DATABASE_URL from it.
# The app's DATABASE_URL is assembled from an env file (.env on the box) so the password is
# never written into this committed compose file.

services:
  app:
    image: ghcr.io/ragesoss/wikiplus:latest
    restart: unless-stopped
    # No published ports: the app is internal-only, reachable from caddy over the default
    # compose network as `app:3000`. Only caddy is exposed to the internet (80/443).
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # The shared Postgres connection (issue #45). Internal compose hostname `postgres:5432`.
      # The password comes from the .env file on the box (POSTGRES_PASSWORD), keeping it out
      # of this committed file. DB access is server-only + lazy — the app opens the connection
      # on first query, never at build/import (so the CI image build needs no DB).
      DATABASE_URL: "postgres://wikiplus:${POSTGRES_PASSWORD}@postgres:5432/wikiplus"
      # NOTE: NEXT_PUBLIC_YOUTUBE_API_KEY is baked into the client bundle at BUILD time
      # (in CI, as a --build-arg), so it is intentionally NOT set here at runtime.
      #
      # --- Auth.js / Wikimedia OAuth RUNTIME secrets (issue C) ---------------------------------
      # Read at RUNTIME by lib/auth/config.ts + Auth.js (NOT at build time — unlike the YouTube
      # key, the OAuth consumer secret must NEVER be baked into the CI image). Compose interpolates
      # them here from /opt/wikiplus/.env (gitignored, chmod 600) and passes them to the container;
      # the committed file carries NO secret values (AC12). As of issue #49 the deploy job injects
      # these .env values from GitHub Actions secrets at deploy time (no manual SSH for setup or
      # rotation) — see docs/ops/vps-setup.md §3c "OAuth runtime secrets". The `:?` guard makes
      # `docker compose up` FAIL LOUDLY if any is unset on the box — so a missing secret is caught
      # at deploy, never shipped as silently-broken login.
      #   - AUTH_SECRET                    : Auth.js JWT session signing/encryption (server-only).
      #   - wikimedia_oauth_client_key     : the Wikimedia OAuth consumer key   (clientId).
      #   - wikimedia_oauth_client_secret  : the Wikimedia OAuth consumer secret (clientSecret).
      # Auth.js base URL — pin the PUBLIC origin so the OAuth redirect_uri is
      # `https://wikiplus.wikiedu.org/api/auth/callback/wikimedia`, matching the registered
      # consumer callback. Behind Caddy/Cloudflare, `trustHost: true` alone resolved the base to
      # the container's HOSTNAME:PORT (`https://0.0.0.0:3000`), which meta rejected as an
      # invalid/mismatched redirect_uri ("Application connection error"). Public value, not a
      # secret — safe as a literal here.
      AUTH_URL: "https://wikiplus.wikiedu.org"
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET missing — set it in /opt/wikiplus/.env (see docs/ops/vps-setup.md)}"
      wikimedia_oauth_client_key: "${wikimedia_oauth_client_key:?wikimedia_oauth_client_key missing — set it in /opt/wikiplus/.env (see docs/ops/vps-setup.md)}"
      wikimedia_oauth_client_secret: "${wikimedia_oauth_client_secret:?wikimedia_oauth_client_secret missing — set it in /opt/wikiplus/.env (see docs/ops/vps-setup.md)}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # --- Migrate one-shot (issue #45): apply Drizzle migrations + seed on every deploy. -------
  #     Uses the SAME app image, overriding the command to run the bundled migrate entrypoint
  #     (dist/migrate.cjs — see ../Dockerfile). Idempotent: re-applies only NEW migrations and
  #     the seed no-ops when present. `restart: "no"` + `depends_on(service_completed_*)` on
  #     app ensures the schema is migrated BEFORE the server starts (AC15). The 1GB box runs
  #     this in seconds; it exits 0 on success.
  migrate:
    image: ghcr.io/ragesoss/wikiplus:latest
    restart: "no"
    command: ["node", "dist/migrate.cjs"]
    environment:
      DATABASE_URL: "postgres://wikiplus:${POSTGRES_PASSWORD}@postgres:5432/wikiplus"
      # Demo-seed gate (issue #75): PRODUCTION does NOT seed the fabricated demo curations.
      # `"false"` disables the deploy-time seed (the gate's truthiness convention — see
      # scripts/migrate.ts `seedDemoContentEnabled`); migrations still apply and the run still
      # exits 0. The seed is a TEST/LOCAL-DEV fixture only — set OFF HERE (the migrate one-shot)
      # ONLY, never on `app` or in local/test runs (which leave it unset ⇒ seeds). The existing
      # prod demo rows are removed once, out-of-band, via scripts/purge-demo-content.ts
      # (see docs/ARCHITECTURE.md "Production seed policy" for the owner/ops invocation).
      SEED_DEMO_CONTENT: "false"
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # ACME account + issued certs (PERSIST — see runbook backup note)
      - caddy_config:/config   # Caddy's autosave config
    depends_on:
      - app

  # --- Postgres (issue #45 / #35 B): the shared, multi-user data store. ----------------------
  #     Internal-only (no published port — reached as `postgres:5432` on the compose network,
  #     like `app`). Password via a Docker secret FILE (POSTGRES_PASSWORD_FILE), never inline.
  #     A persistent named volume (`pgdata`) survives restarts/redeploys (durable curations).
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: wikiplus
      POSTGRES_USER: wikiplus
      # Read from a Docker secret file (mounted below), NOT inline (AC14).
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Internal-only; the app/migrate reach it as `postgres:5432`. No published ports.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikiplus -d wikiplus"]
      interval: 5s
      timeout: 5s
      retries: 10

secrets:
  # File-based Docker secret. Place the password at /opt/wikiplus/secrets/postgres_password
  # on the box (see docs/ops/vps-setup.md); it is mounted read-only at /run/secrets/.
  postgres_password:
    file: ./secrets/postgres_password

volumes:
  caddy_data:
  caddy_config:
  pgdata:   # the shared, durable Postgres data (issue #45)
